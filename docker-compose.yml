services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fishlog
      POSTGRES_PASSWORD: fishlog123
      POSTGRES_DB: fishlog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fishlog"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://fishlog:fishlog123@db:5432/fishlog
      JWT_SECRET_KEY: your-secret-key-change-in-production
      AMAP_WEB_SERVICE_KEY: ${AMAP_WEB_SERVICE_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/ssl/anglrlog:/etc/ssl/anglrlog:ro

volumes:
  postgres_data:
