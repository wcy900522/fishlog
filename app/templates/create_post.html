{% extends "base.html" %}

{% block title %}发布帖子 - AnglrLog{% endblock %}

{% block extra_css %}
<style>
    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        font-weight: 600;
        margin-bottom: 10px;
        color: var(--primary-blue);
    }

    textarea {
        font-family: 'Courier New', monospace;
        resize: vertical;
        min-height: 300px;
    }
</style>
{% endblock %}

{% block content %}
<div class="mb-4">
    <h1 class="page-title">
        <i class="fas fa-pen"></i> 发布新帖
    </h1>
</div>

<div class="row">
    <div class="col-lg-8 mx-auto">
        <div class="card">
            <div class="card-body">
                <div class="form-group">
                    <label for="title">帖子标题</label>
                    <input type="text" class="form-control" id="title" placeholder="请输入帖子标题" required>
                </div>

                <div class="form-group">
                    <label for="content">内容</label>
                    <textarea class="form-control" id="content" placeholder="请输入帖子内容" required></textarea>
                </div>

                <div class="form-group">
                    <button class="btn btn-success" onclick="submitPost()" id="submitBtn">
                        <i class="fas fa-check"></i> 发布
                    </button>
                    <a href="/forum" class="btn btn-secondary ms-2">
                        <i class="fas fa-times"></i> 取消
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function submitPost() {
        const title = document.getElementById('title').value.trim();
        const content = document.getElementById('content').value.trim();
        const token = localStorage.getItem('token');

        if (!title || !content) {
            alert('标题和内容不能为空');
            return;
        }

        if (!token) {
            alert('请先登录');
            window.location.href = '/login';
            return;
        }

        try {
            const response = await fetch('/api/forum/posts', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    title: title,
                    content: content
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.detail || 'Failed to create post');
            }

            const post = await response.json();
            alert('帖子发布成功');
            window.location.href = `/forum/posts/${post.id}`;
        } catch (error) {
            console.error('Error:', error);
            alert('发布失败: ' + error.message);
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const token = localStorage.getItem('token');
        if (!token) {
            alert('请先登录');
            window.location.href = '/login';
        }
    });
</script>
{% endblock %}
