{% extends "base.html" %}

{% block title %}发布帖子 - AnglrLog{% endblock %}

{% block extra_css %}
<style>
    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        font-weight: 600;
        margin-bottom: 10px;
        color: var(--brand-deep);
    }

    textarea {
        resize: vertical;
        min-height: 300px;
    }

    .post-image-preview {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
    }

    .post-image-preview__item {
        aspect-ratio: 1;
        border: 1px solid var(--border-soft);
        border-radius: 8px;
        overflow: hidden;
        background: var(--surface-soft);
    }

    .post-image-preview__item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    @media (max-width: 576px) {
        .post-image-preview {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="mb-4">
    <h1 class="page-title">
        <i class="fas fa-pen"></i> 发布新帖
    </h1>
</div>

<div class="row">
    <div class="col-lg-8 mx-auto">
        <div class="card">
            <div class="card-body">
                <div class="form-group">
                    <label for="title">帖子标题</label>
                    <input type="text" class="form-control" id="title" placeholder="请输入帖子标题" required>
                </div>

                <div class="form-group">
                    <label for="tag">话题标签</label>
                    <select class="form-select" id="tag" required>
                        <option value="海钓">海钓</option>
                        <option value="路亚">路亚</option>
                        <option value="台钓">台钓</option>
                        <option value="飞钓">飞钓</option>
                        <option value="黑坑">黑坑</option>
                        <option value="野钓" selected>野钓</option>
                        <option value="技术分享">技术分享</option>
                        <option value="装备评测">装备评测</option>
                        <option value="钓点攻略">钓点攻略</option>
                        <option value="秀出鱼获">秀出鱼获</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="content">内容</label>
                    <textarea class="form-control" id="content" placeholder="请输入帖子内容" required></textarea>
                </div>

                <div class="form-group">
                    <label for="postImages">帖子照片</label>
                    <input type="file" class="form-control" id="postImages" accept="image/*" capture="environment" multiple>
                    <small class="form-text text-muted" id="postImageLimitText">可拍照或从手机相册选择，最多上传 5 张</small>
                    <div class="post-image-preview" id="postImagePreview"></div>
                </div>

                <div class="form-group">
                    <button class="btn btn-success" onclick="submitPost()" id="submitBtn">
                        <i class="fas fa-check"></i> 发布
                    </button>
                    <a href="/forum" class="btn btn-secondary ms-2">
                        <i class="fas fa-times"></i> 取消
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function getPostImageLimit() {
        return document.getElementById('tag').value === '秀出鱼获' ? 3 : 5;
    }

    function updatePostImageLimitText() {
        const limit = getPostImageLimit();
        document.getElementById('postImageLimitText').textContent = limit === 3
            ? '秀出鱼获最多上传 3 张鱼获照片'
            : '可拍照或从手机相册选择，最多上传 5 张';
        renderPostImagePreview();
    }

    async function submitPost() {
        const title = document.getElementById('title').value.trim();
        const tag = document.getElementById('tag').value;
        const content = document.getElementById('content').value.trim();
        const token = localStorage.getItem('token');

        if (!title || !content) {
            alert('标题和内容不能为空');
            return;
        }

        if (!token) {
            alert('请先登录');
            window.location.href = '/login';
            return;
        }

        try {
            const imageUrls = await uploadPostImages();
            const response = await fetch('/api/forum/posts', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    title: title,
                    tag: tag,
                    content: content,
                    image_urls: imageUrls.length ? imageUrls : null
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.detail || 'Failed to create post');
            }

            const post = await response.json();
            alert('帖子发布成功');
            window.location.href = `/forum/posts/${post.id}`;
        } catch (error) {
            console.error('Error:', error);
            alert('发布失败: ' + error.message);
        }
    }

    function renderPostImagePreview() {
        const input = document.getElementById('postImages');
        const preview = document.getElementById('postImagePreview');
        const files = Array.from(input.files || []);
        const limit = getPostImageLimit();
        if (files.length > limit) {
            alert(limit === 3 ? '秀出鱼获最多上传 3 张鱼获照片' : '最多上传 5 张帖子照片');
            input.value = '';
            preview.innerHTML = '';
            return;
        }
        preview.innerHTML = files.map(file => `
            <div class="post-image-preview__item">
                <img src="${URL.createObjectURL(file)}" alt="帖子照片">
            </div>
        `).join('');
    }

    async function uploadPostImages() {
        const input = document.getElementById('postImages');
        const files = Array.from(input.files || []);
        const limit = getPostImageLimit();
        if (files.length > limit) {
            throw new Error(limit === 3 ? '秀出鱼获最多上传 3 张鱼获照片' : '最多上传 5 张帖子照片');
        }
        const token = localStorage.getItem('token');
        const urls = [];
        for (const file of files) {
            const formData = new FormData();
            formData.append('image', file);
            const response = await fetch('/api/forum/images', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`
                },
                body: formData
            });
            if (!response.ok) {
                const error = await response.json().catch(() => ({}));
                throw new Error(error.detail || '图片上传失败');
            }
            const result = await response.json();
            urls.push(result.url);
        }
        return urls;
    }

    document.addEventListener('DOMContentLoaded', function() {
        const token = localStorage.getItem('token');
        if (!token) {
            alert('请先登录');
            window.location.href = '/login';
        }
        document.getElementById('postImages').addEventListener('change', renderPostImagePreview);
        document.getElementById('tag').addEventListener('change', updatePostImageLimitText);
        updatePostImageLimitText();
    });
</script>
{% endblock %}
