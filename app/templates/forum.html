{% extends "base.html" %}

{% block title %}讨论专区 - 渔迹录{% endblock %}

{% block extra_css %}
<style>
    .post-card {
        cursor: pointer;
        transition: all 0.3s;
    }

    .post-card:hover {
        transform: translateY(-2px);
    }

    .post-title {
        color: var(--primary-blue);
        font-weight: 600;
        text-decoration: none;
    }

    .post-title:hover {
        color: var(--secondary-blue);
        text-decoration: underline;
    }

    .post-meta {
        font-size: 0.9rem;
        color: #999;
    }

    .post-content-preview {
        color: #555;
        margin: 10px 0;
        line-height: 1.6;
    }

    .search-box {
        margin-bottom: 30px;
    }

    .posts-container {
        gap: 20px;
    }

    .tag-filter {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 24px;
    }

    .tag-filter .btn {
        border-radius: 20px;
        padding: 6px 16px;
    }

    .post-tag {
        display: inline-flex;
        align-items: center;
        padding: 3px 10px;
        border-radius: 14px;
        background: #e8f4f8;
        color: var(--primary-blue);
        font-size: 0.82rem;
        font-weight: 600;
        margin-bottom: 8px;
    }

    .level-chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(13, 164, 166, 0.12);
        color: var(--brand-teal);
        font-size: 0.78rem;
        font-weight: 700;
        margin-left: 8px;
    }
</style>
{% endblock %}

{% block content %}
<div class="mb-4">
    <h1 class="page-title">
        <i class="fas fa-comments"></i> 讨论专区
    </h1>
    <p class="page-subtitle">分享钓鱼经验，交流技术技巧</p>
</div>

<div class="tag-filter" id="tagFilter">
    <button type="button" class="btn btn-primary active" data-tag="" onclick="selectTag('')">全部</button>
    <button type="button" class="btn btn-outline-primary" data-tag="海钓" onclick="selectTag('海钓')">海钓</button>
    <button type="button" class="btn btn-outline-primary" data-tag="路亚" onclick="selectTag('路亚')">路亚</button>
    <button type="button" class="btn btn-outline-primary" data-tag="台钓" onclick="selectTag('台钓')">台钓</button>
    <button type="button" class="btn btn-outline-primary" data-tag="飞钓" onclick="selectTag('飞钓')">飞钓</button>
    <button type="button" class="btn btn-outline-primary" data-tag="黑坑" onclick="selectTag('黑坑')">黑坑</button>
    <button type="button" class="btn btn-outline-primary" data-tag="野钓" onclick="selectTag('野钓')">野钓</button>
    <button type="button" class="btn btn-outline-primary" data-tag="技术分享" onclick="selectTag('技术分享')">技术分享</button>
    <button type="button" class="btn btn-outline-primary" data-tag="装备评测" onclick="selectTag('装备评测')">装备评测</button>
    <button type="button" class="btn btn-outline-primary" data-tag="钓点攻略" onclick="selectTag('钓点攻略')">钓点攻略</button>
</div>

<div class="search-box">
    <div class="input-group">
        <input type="text" class="form-control" id="searchInput" placeholder="搜索帖子标题或内容...">
        <button class="btn btn-primary" type="button" onclick="searchPosts()">搜索</button>
    </div>
</div>

<div class="mb-3">
    <a href="/forum/create" class="btn btn-success" id="createPostBtn" style="display:none;">
        <i class="fas fa-plus"></i> 发布新帖
    </a>
</div>

<div id="postsContainer" class="posts-container">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">加载中...</span>
    </div>
</div>

<script>
    let currentPage = 0;
    let currentTag = '';
    const postsPerPage = 10;

    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleString('zh-CN');
    }

    function escapeHTML(value) {
        return String(value ?? '').replace(/[&<>"']/g, function(char) {
            return {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char];
        });
    }

    function truncateContent(content, length = 100) {
        if (content.length > length) {
            return content.substring(0, length) + '...';
        }
        return content;
    }

    async function loadPosts(page = 0, keyword = null) {
        try {
            const params = new URLSearchParams({
                skip: page * postsPerPage,
                limit: postsPerPage
            });
            if (currentTag) params.append('tag', currentTag);
            if (keyword) params.append('keyword', keyword);

            const url = keyword
                ? `/api/forum/posts/search?${params.toString()}`
                : `/api/forum/posts?${params.toString()}`;

            const response = await fetch(url);
            if (!response.ok) throw new Error('Failed to fetch posts');

            const posts = await response.json();
            const container = document.getElementById('postsContainer');

            if (posts.length === 0) {
                container.innerHTML = '<div class="alert alert-info">暂无帖子</div>';
                return;
            }

            let html = '';
            posts.forEach(post => {
                html += `
                    <div class="card post-card" onclick="window.location.href='/forum/posts/${post.id}'">
                        <div class="card-body">
                            <span class="post-tag">${escapeHTML(post.tag || '野钓')}</span>
                            <h5 class="card-title post-title">${escapeHTML(post.title)}</h5>
                            <p class="post-meta">
                                <i class="fas fa-user"></i> ${escapeHTML(post.user_nickname || '未知用户')}
                                <span class="level-chip">Lv${post.user_level || 1} ${escapeHTML(post.user_title || '初学钓手')}</span>
                                <i class="fas fa-clock ms-3"></i> ${formatDate(post.created_at)}
                                <i class="fas fa-comments ms-3"></i> ${post.comment_count} 条评论
                                <i class="fas fa-heart ms-3"></i> ${post.like_count || 0}
                                ${post.is_featured ? '<i class="fas fa-star ms-3 text-warning"></i> 精华' : ''}
                            </p>
                            <p class="post-content-preview">${escapeHTML(truncateContent(post.content))}</p>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        } catch (error) {
            console.error('Error loading posts:', error);
            document.getElementById('postsContainer').innerHTML = '<div class="alert alert-danger">加载失败</div>';
        }
    }

    function searchPosts() {
        const keyword = document.getElementById('searchInput').value.trim();
        currentPage = 0;
        loadPosts(currentPage, keyword);
    }

    function selectTag(tag) {
        currentTag = tag;
        currentPage = 0;
        document.querySelectorAll('#tagFilter button').forEach(button => {
            const isActive = button.dataset.tag === tag;
            button.classList.toggle('active', isActive);
            button.classList.toggle('btn-primary', isActive);
            button.classList.toggle('btn-outline-primary', !isActive);
        });
        loadPosts(0, document.getElementById('searchInput').value.trim());
    }

    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            searchPosts();
        }
    });

    document.addEventListener('DOMContentLoaded', function() {
        const token = localStorage.getItem('token');
        if (token) {
            document.getElementById('createPostBtn').style.display = 'block';
        }
        loadPosts(0);
    });
</script>
{% endblock %}
