{% extends "base.html" %}

{% block title %}登录 - AnglrLog{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="brand-panel auth-card__head">
            <i class="fas fa-fish"></i>
            <h3 class="mb-0">钓鱼人登录</h3>
            <p class="mb-0 mt-2 opacity-75">开启您的钓鱼之旅</p>
        </div>

        <div class="auth-card__body">
                <div id="formAlert" class="alert alert-danger d-none" role="alert"></div>
                <form id="loginForm">
                    <div class="mb-4">
                        <label for="phone" class="form-label">
                            <i class="fas fa-phone"></i> 手机号
                        </label>
                        <input type="tel" class="form-control" id="phone" name="phone" placeholder="请输入手机号" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock"></i> 密码
                        </label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt"></i> 登录
                    </button>
                </form>

                <div class="soft-divider">或</div>

                <a href="/api/auth/wechat/login" id="wechatLoginLink" class="btn btn-success w-100">
                    <i class="fab fa-weixin"></i> 微信授权登录
                </a>

                <div class="mt-4 pt-4 text-center border-top">
                    <p class="text-muted mb-0">还没有账户？</p>
                    <a href="/register" class="text-link">
                        <i class="fas fa-user-plus"></i> 点击注册
                    </a>
                </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', async function() {
        const params = new URLSearchParams(window.location.search);
        const wechatError = params.get('wechat_error');
        if (wechatError) {
            alert('微信登录失败：' + wechatError);
            window.history.replaceState({}, document.title, '/login');
        }

        const wechatLoginLink = document.getElementById('wechatLoginLink');
        try {
            const response = await fetch('/api/auth/wechat/status');
            const data = await response.json();
            if (!data.enabled) {
                wechatLoginLink.classList.add('disabled');
                wechatLoginLink.setAttribute('aria-disabled', 'true');
                wechatLoginLink.title = '微信登录未配置';
                wechatLoginLink.innerHTML = '<i class="fab fa-weixin"></i> 微信登录未启用';
            }
        } catch (error) {
            wechatLoginLink.classList.add('disabled');
            wechatLoginLink.setAttribute('aria-disabled', 'true');
            wechatLoginLink.title = '微信登录状态获取失败';
        }

        wechatLoginLink.addEventListener('click', function(event) {
            if (wechatLoginLink.classList.contains('disabled')) {
                event.preventDefault();
                alert('微信登录未配置，请先设置 WECHAT_APP_ID 和 WECHAT_APP_SECRET');
            }
        });
    });

    function showFormAlert(message) {
        const box = document.getElementById('formAlert');
        box.innerHTML = `<i class="fas fa-circle-exclamation"></i> ${message}`;
        box.classList.remove('d-none');
    }

    function clearFormAlert() {
        document.getElementById('formAlert').classList.add('d-none');
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        clearFormAlert();

        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;
        const btn = this.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登录中...';

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ phone, password })
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('token', data.access_token);
                window.location.replace('/');
            } else {
                const message = await parseApiError(response);
                showFormAlert(message === 'Invalid credentials' ? '手机号或密码错误' : message);
            }
        } catch (error) {
            console.error('Error:', error);
            showFormAlert('登录失败，请重试');
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    });
</script>
{% endblock %}
