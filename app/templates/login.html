{% extends "base.html" %}

{% block title %}登录 - AnglrLog{% endblock %}

{% block content %}
<div class="row justify-content-center" style="min-height: 500px; align-items: center;">
    <div class="col-md-5 col-lg-4">
        <div style="background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 8px 25px rgba(26, 95, 122, 0.15);">
            <!-- 头部 -->
            <div style="background: linear-gradient(135deg, #1a5f7a 0%, #2d8fa3 100%); color: white; padding: 40px 20px; text-align: center;">
                <div style="font-size: 3.5rem; margin-bottom: 15px;">
                    <i class="fas fa-fish"></i>
                </div>
                <h3 style="margin: 0;">钓鱼人登录</h3>
                <p style="margin: 10px 0 0 0; opacity: 0.9;">开启您的钓鱼之旅</p>
            </div>

            <!-- 表单 -->
            <div style="padding: 35px 25px;">
                <form id="loginForm">
                    <div class="mb-4">
                        <label for="phone" class="form-label" style="font-weight: 600; color: #1a5f7a;">
                            <i class="fas fa-phone"></i> 手机号
                        </label>
                        <input type="tel" class="form-control" id="phone" name="phone" placeholder="请输入手机号" required
                               style="border-radius: 8px; padding: 12px 15px; border: 2px solid #e0e0e0;">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label" style="font-weight: 600; color: #1a5f7a;">
                            <i class="fas fa-lock"></i> 密码
                        </label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required
                               style="border-radius: 8px; padding: 12px 15px; border: 2px solid #e0e0e0;">
                    </div>
                    <button type="submit" class="btn btn-primary w-100"
                            style="background: linear-gradient(135deg, #2d8fa3 0%, #1a5f7a 100%); border: none; padding: 12px; font-weight: 600; border-radius: 8px;">
                        <i class="fas fa-sign-in-alt"></i> 登录
                    </button>
                </form>

                <div style="margin-top: 20px; text-align: center; padding-top: 20px; border-top: 1px solid #e0e0e0;">
                    <p class="text-muted mb-0">还没有账户？</p>
                    <a href="/register" style="color: #2d8fa3; font-weight: 600; text-decoration: none;">
                        <i class="fas fa-user-plus"></i> 点击注册
                    </a>
                </div>
            </div>
        </div>

        <!-- 提示信息 -->
        <div style="margin-top: 30px; text-align: center;">
            <div class="alert alert-info" style="background: rgba(45, 143, 163, 0.1); border: 2px solid #2d8fa3; color: #1a5f7a;">
                <i class="fas fa-info-circle"></i>
                <strong>Demo账号：</strong> 18610137321 / admin123
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;
        const btn = this.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登录中...';

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ phone, password })
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('token', data.access_token);
                alert('✅ 登录成功！');
                window.location.href = '/';
            } else {
                alert('❌ 登录失败：手机号或密码错误');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('❌ 登录失败，请重试');
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    });
</script>
{% endblock %}
