{% extends "base.html" %}

{% block title %}注册 - AnglrLog{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="brand-panel auth-card__head">
            <i class="fas fa-fish"></i>
            <h3 class="mb-0">创建钓鱼账户</h3>
            <p class="mb-0 mt-2 opacity-75">加入钓鱼人社区</p>
        </div>

        <div class="auth-card__body">
                <div id="formAlert" class="alert d-none" role="alert"></div>
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="nickname" class="form-label">
                            <i class="fas fa-user"></i> 昵称
                        </label>
                        <input type="text" class="form-control" id="nickname" name="nickname" placeholder="输入您的昵称" required>
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">
                            <i class="fas fa-phone"></i> 手机号
                        </label>
                        <input type="tel" class="form-control" id="phone" name="phone" placeholder="输入手机号" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock"></i> 密码
                        </label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="设置密码" required>
                        <small class="form-text text-muted d-block mt-2">至少8位，需同时包含字母和数字，不能使用连续数字或常见弱密码。</small>
                    </div>
                    <div class="mb-4">
                        <label for="confirmPassword" class="form-label">
                            <i class="fas fa-check-circle"></i> 确认密码
                        </label>
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="确认密码" required>
                        <small id="confirmHint" class="form-text d-block mt-2"></small>
                    </div>
                    <button type="submit" class="btn btn-success w-100">
                        <i class="fas fa-user-plus"></i> 注册账户
                    </button>
                </form>

                <div class="mt-4 pt-4 text-center border-top">
                    <p class="text-muted mb-0">已有账户？</p>
                    <a href="/login" class="text-link">
                        <i class="fas fa-sign-in-alt"></i> 点击登录
                    </a>
                </div>
        </div>
    </div>
</div>

<script>
    function getPasswordComplexityError(password) {
        const weakPasswords = new Set([
            '123456',
            '12345678',
            '123456789',
            '11111111',
            '00000000',
            'password',
            'password123',
            'qwerty123'
        ]);
        const lower = password.toLowerCase();
        const sequences = ['0123456789', '9876543210', 'abcdefghijklmnopqrstuvwxyz', 'zyxwvutsrqponmlkjihgfedcba'];

        if (password.length < 8) {
            return '密码长度不能少于8位';
        }
        if (weakPasswords.has(lower)) {
            return '密码过于简单，请换一个更安全的密码';
        }
        if (!/[A-Za-z]/.test(password) || !/\d/.test(password)) {
            return '密码必须同时包含字母和数字';
        }
        if (new Set(password).size === 1 || sequences.some(sequence => sequence.includes(lower))) {
            return '密码不能使用连续或重复字符';
        }
        return '';
    }

    function formatRegisterError(payload) {
        if (payload && typeof payload.message === 'string') {
            return payload.message;
        }
        if (payload && Array.isArray(payload.detail)) {
            const passwordError = payload.detail.find(item => Array.isArray(item.loc) && item.loc.includes('password'));
            if (passwordError && passwordError.msg) {
                return passwordError.msg.replace(/^Value error,\s*/, '');
            }
        }
        if (payload && typeof payload.detail === 'string') {
            if (payload.detail === 'Phone already registered') {
                return '该手机号已被注册';
            }
            return payload.detail;
        }
        return '注册失败，请重试';
    }

    function showFormAlert(message, type = 'danger') {
        const box = document.getElementById('formAlert');
        const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation';
        box.className = `alert alert-${type}`;
        box.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
    }

    function clearFormAlert() {
        const box = document.getElementById('formAlert');
        box.className = 'alert d-none';
    }

    // 实时确认两次密码是否一致
    const confirmInput = document.getElementById('confirmPassword');
    const passwordInput = document.getElementById('password');
    const confirmHint = document.getElementById('confirmHint');

    function updateConfirmHint() {
        const confirm = confirmInput.value;
        if (!confirm) {
            confirmHint.textContent = '';
            confirmInput.classList.remove('is-valid', 'is-invalid');
            return;
        }
        if (confirm === passwordInput.value) {
            confirmHint.textContent = '两次密码一致';
            confirmHint.className = 'form-text d-block mt-2 text-success';
            confirmInput.classList.add('is-valid');
            confirmInput.classList.remove('is-invalid');
        } else {
            confirmHint.textContent = '两次密码不一致';
            confirmHint.className = 'form-text d-block mt-2 text-danger';
            confirmInput.classList.add('is-invalid');
            confirmInput.classList.remove('is-valid');
        }
    }

    confirmInput.addEventListener('input', updateConfirmHint);
    passwordInput.addEventListener('input', updateConfirmHint);

    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        clearFormAlert();

        const nickname = document.getElementById('nickname').value;
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (password !== confirmPassword) {
            showFormAlert('两次输入的密码不一致');
            return;
        }

        const passwordError = getPasswordComplexityError(password);
        if (passwordError) {
            showFormAlert(passwordError);
            return;
        }

        const btn = this.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 注册中...';

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ nickname, phone, password })
            });

            if (response.ok) {
                showFormAlert('注册成功！正在跳转到登录…', 'success');
                setTimeout(() => { window.location.href = '/login'; }, 900);
            } else {
                const payload = await response.json().catch(() => null);
                showFormAlert(formatRegisterError(payload));
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        } catch (error) {
            console.error('Error:', error);
            showFormAlert('注册失败，请重试');
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    });
</script>
{% endblock %}
