<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AnglrLog - 钓鱼记录{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
    <script>
        /* 深色模式：首帧同步应用，避免闪烁（在 body 渲染前执行）*/
        (function () {
            try {
                var saved = localStorage.getItem('anglr-theme');
                var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (saved === 'dark' || (!saved && prefersDark)) {
                    document.documentElement.classList.add('dark');
                }
            } catch (e) {}
        })();
    </script>
    <style>
        :root {
            /* 主色系：深森林绿 #0A3C35 + 湖水青 #4ECDC4 + 暖米白 */
            --brand-ink: #072A25;        /* 最深森林 */
            --brand-deep: #0A3C35;       /* 主色 · 深森林绿 */
            --brand-teal: #1F9E8D;       /* 功能强调（文字/图标，保证可读对比）*/
            --brand-mint: #4ECDC4;       /* 湖水青 · 高光 / 渐变 */
            --brand-amber: #E0A458;      /* 暖沙点缀 */
            --brand-coral: #E0796B;
            --brand-electric: #6FE0D2;   /* 亮青 */
            --sky-wash: #E8F3EF;
            --sky-soft: #F2F7F2;
            --surface: #FCFAF4;          /* 卡面 · 暖米白 */
            --surface-soft: #F1EEE4;
            --surface-tint: #E7F1EC;
            --surface-warm: #FBF4E6;
            --glass-strong: rgba(252, 250, 244, 0.92);
            --glass-dark: rgba(10, 60, 53, 0.9);
            --border-soft: rgba(10, 60, 53, 0.14);
            --border-strong: rgba(10, 60, 53, 0.2);
            --text-dark: #14231F;
            --text-muted: #5B6B63;
            --primary-blue: var(--brand-teal);
            --secondary-blue: var(--brand-deep);
            --shadow-soft: 0 6px 24px rgba(10, 60, 53, 0.09);
            --shadow-strong: 0 14px 44px rgba(10, 60, 53, 0.16);
            --shadow-lift: 0 18px 40px rgba(10, 60, 53, 0.18);
            --focus-ring: 0 0 0 0.25rem rgba(78, 205, 196, 0.28);
            /* RGB 分量：供 rgba() 动态透明度使用 */
            --brand-teal-rgb: 31, 158, 141;
            --brand-deep-rgb: 10, 60, 53;
            --brand-mint-rgb: 78, 205, 196;
            --brand-amber-rgb: 224, 164, 88;
            --brand-coral-rgb: 224, 121, 107;
            /* 补齐历史遗漏的 surface token */
            --surface-muted: #E8F0EA;
            /* 页面画布（供 body 背景引用，深浅模式统一入口）*/
            --page-bg-top: rgba(246, 243, 236, 0.94);
            --page-bg-mid: rgba(248, 245, 238, 0.97);
            --page-bg-bottom: rgba(250, 248, 242, 1);
            --grid-line: rgba(10, 60, 53, 0.08);
            /* 全局圆角标度 */
            --radius: 14px;
            --radius-lg: 18px;
            --radius-pill: 999px;
            /* 语义色（勋章 / 深琥珀文本 / 进度渐变） */
            --text-amber-dark: #9a6b12;
            --medal-gold: #f7d774;
            --medal-silver: #dce5ea;
            --medal-bronze: #efc39b;
            --progress-start: var(--brand-teal);
            --progress-mid: var(--brand-mint);
            --progress-end: var(--brand-amber);
            color-scheme: light;
        }

        /* ============ 深色模式：翻转 surface / text 语义 token ============
           说明：nav / footer / card-header 的品牌绿渐变多为硬编码字面量，
           深色下天然协调，无需改动；此处只翻转“表面 + 文字”角色的 token。 */
        html.dark {
            --brand-ink: #EDF2EE;        /* 文字角色 → 近白 */
            --brand-deep: #A9E9DF;       /* 标题文字 → 浅湖青（在深底可读）*/
            --brand-teal: #4ECDC4;       /* 强调 → 亮湖水青 */
            --brand-mint: #4ECDC4;
            --brand-electric: #6FE0D2;
            --sky-wash: #12201C;
            --sky-soft: #0F1C18;
            --surface: #12201C;          /* 卡面 → 深森林 */
            --surface-soft: #16261F;
            --surface-tint: #17322B;
            --surface-warm: #1E2A22;
            --surface-muted: #16261F;
            --glass-strong: rgba(18, 32, 28, 0.86);
            --glass-dark: rgba(6, 18, 15, 0.9);
            --border-soft: rgba(78, 205, 196, 0.16);
            --border-strong: rgba(78, 205, 196, 0.24);
            --text-dark: #EDF2EE;
            --text-muted: #8FA69C;
            --shadow-soft: 0 6px 24px rgba(0, 0, 0, 0.4);
            --shadow-strong: 0 14px 44px rgba(0, 0, 0, 0.5);
            --shadow-lift: 0 18px 40px rgba(0, 0, 0, 0.52);
            --page-bg-top: rgba(11, 21, 18, 0.96);
            --page-bg-mid: rgba(12, 22, 19, 0.98);
            --page-bg-bottom: #0B1512;
            --grid-line: rgba(78, 205, 196, 0.08);
            --text-amber-dark: #E0C089;
            color-scheme: dark;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background:
                linear-gradient(180deg, var(--page-bg-top) 0%, var(--page-bg-mid) 42%, var(--page-bg-bottom) 100%),
                url('/static/fishing-lake-bg.svg') center top / cover fixed no-repeat;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            isolation: isolate;
            overflow-x: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        html.dark body {
            /* 深色下弱化湖面底图，让森林绿画布主导 */
            background:
                linear-gradient(180deg, var(--page-bg-top) 0%, var(--page-bg-mid) 42%, var(--page-bg-bottom) 100%),
                radial-gradient(1200px 600px at 78% -8%, rgba(78, 205, 196, 0.1), transparent 60%),
                var(--page-bg-bottom);
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            inset: 0;
            opacity: 0.16;
            background-image:
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
                linear-gradient(180deg, var(--grid-line) 1px, transparent 1px);
            background-size: 84px 84px;
            mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.5), transparent 72%);
        }

        body::after {
            display: none;
        }

        /* 导航栏 */
        .navbar {
            position: relative;
            z-index: 4;
            background: linear-gradient(90deg, rgba(7, 52, 66, 0.96), rgba(7, 88, 106, 0.94));
            backdrop-filter: blur(18px) saturate(1.15);
            box-shadow: 0 10px 28px rgba(7, 52, 66, 0.18);
            border-bottom: 1px solid rgba(117, 215, 239, 0.22);
            min-height: 68px;
        }

        .navbar .container-fluid {
            max-width: 1480px;
            padding-left: clamp(18px, 4vw, 56px);
            padding-right: clamp(18px, 4vw, 56px);
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.36rem;
            color: white !important;
            display: flex;
            align-items: center;
            gap: 11px;
            letter-spacing: 0;
        }

        .navbar-brand i {
            color: #aeefff;
            font-size: 1.5rem;
            filter: none;
        }

        .nav-link {
            color: rgba(239, 254, 250, 0.86) !important;
            font-weight: 500;
            transition: color 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            border-radius: var(--radius);
            padding: 9px 12px !important;
        }

        .nav-link:hover {
            color: #ffffff !important;
            background: rgba(174, 239, 255, 0.12);
            box-shadow: inset 0 0 0 1px rgba(174, 239, 255, 0.2);
        }

        .nav-link::after {
            display: none;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* 主容器 */
        main {
            flex: 1;
            padding: 0 0 64px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .container {
            max-width: 1280px;
        }

        .site-main > :not(.bleed):not(.home-hero):not(.home-metrics-wrap):not(.home-announcement):not(.home-section):not(.mission-band) {
            max-width: 1280px;
            margin-left: auto;
            margin-right: auto;
            padding-left: clamp(16px, 3vw, 28px);
            padding-right: clamp(16px, 3vw, 28px);
        }

        .site-main > :not(.bleed):not(.home-hero):not(.home-metrics-wrap):not(.home-announcement):not(.home-section):not(.mission-band):first-child {
            margin-top: clamp(32px, 5vw, 56px);
        }

        /* 页面标题 */
        .page-title {
            font-size: clamp(1.9rem, 3.8vw, 3rem);
            font-weight: 900;
            color: var(--brand-deep);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            letter-spacing: 0;
        }

        .page-title i {
            color: var(--brand-teal);
            font-size: 0.92em;
            filter: none;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 1.12rem;
            margin-bottom: 34px;
        }

        /* 卡片 */
        .card {
            border: 1px solid var(--border-soft);
            border-radius: var(--radius);
            box-shadow: var(--shadow-soft);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            overflow: hidden;
            margin-bottom: 20px;
            background: var(--glass-strong);
            backdrop-filter: blur(10px) saturate(1.04);
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-strong);
            border-color: rgba(14, 143, 163, 0.34);
        }

        .card-header {
            background:
                linear-gradient(135deg, #07586a, #0e8fa3);
            color: white;
            border: none;
            font-weight: 600;
            padding: 18px 22px;
        }

        .card-body {
            padding: 25px;
        }

        /* 按钮 */
        .btn {
            border-radius: var(--radius);
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            border: none;
            padding: 10px 18px;
        }

        .btn-primary {
            color: #062b35;
            background: linear-gradient(135deg, #84ddf2, #8de3ca);
            box-shadow: 0 10px 22px rgba(14, 143, 163, 0.18);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            color: #062b35;
            box-shadow: 0 14px 30px rgba(14, 143, 163, 0.24);
            background: linear-gradient(135deg, #b8f1ff, #a9eedc);
        }

        .btn-success {
            color: #073642;
            background: linear-gradient(135deg, #67d8b4, #c6e77b);
            box-shadow: 0 10px 22px rgba(87, 199, 166, 0.18);
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #54c6a0, #b9dc69);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(52, 178, 123, 0.24);
        }

        .btn-danger {
            background: #e96f5b;
            color: #fff;
        }

        .btn-danger:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .btn-outline-primary {
            color: var(--brand-teal);
            border: 1px solid rgba(14, 143, 163, 0.34);
            background: rgba(255, 255, 255, 0.72);
        }

        .btn-outline-primary:hover {
            color: #fff;
            background: var(--brand-teal);
            box-shadow: 0 10px 22px rgba(22, 115, 122, 0.18);
        }

        .btn-outline-secondary {
            color: var(--brand-deep);
            border: 1px solid var(--border-soft);
            background: rgba(255, 255, 255, 0.78);
        }

        .btn-secondary {
            color: var(--brand-deep);
            background: #e8f6fb;
            border: 1px solid var(--border-soft);
        }

        .btn-secondary:hover {
            color: var(--brand-deep);
            background: #f5fcff;
            box-shadow: var(--shadow-lift);
        }

        .btn-outline-secondary:hover {
            color: var(--brand-deep);
            background: #fff;
            box-shadow: 0 10px 22px rgba(18, 53, 59, 0.1);
        }

        /* 输入框 */
        .form-control, .form-select {
            border: 1px solid var(--border-soft);
            border-radius: var(--radius);
            padding: 12px 15px;
            font-size: 1rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            background: rgba(255, 255, 255, 0.94);
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--brand-teal);
            box-shadow: var(--focus-ring);
        }

        .input-group .form-control {
            min-height: 46px;
        }

        .dropdown-menu {
            border: 1px solid var(--border-soft);
            border-radius: var(--radius);
            box-shadow: var(--shadow-strong);
            padding: 8px;
        }

        .dropdown-item {
            border-radius: 6px;
            color: var(--text-dark);
            padding: 9px 12px;
        }

        .dropdown-item:hover,
        .dropdown-item:focus {
            color: var(--brand-deep);
            background: var(--surface-soft);
        }

        .table {
            --bs-table-bg: transparent;
            --bs-table-color: var(--text-dark);
            margin-bottom: 0;
        }

        .table thead th {
            color: var(--brand-deep);
            background: var(--surface-soft);
            border-bottom: 1px solid var(--border-soft);
            font-size: 0.88rem;
            font-weight: 800;
        }

        .table tbody td {
            border-color: rgba(89, 169, 188, 0.16);
        }

        .table-hover tbody tr:hover {
            --bs-table-hover-bg: rgba(223, 246, 255, 0.52);
        }

        .alert {
            border-radius: var(--radius);
            border: 1px solid var(--border-soft);
            box-shadow: 0 10px 24px rgba(8, 88, 106, 0.06);
        }

        .modal {
            z-index: 1080;
        }

        .modal-backdrop {
            z-index: 1070;
        }

        body.modal-open .site-main {
            z-index: auto;
        }

        /* 底部 */
        footer {
            position: relative;
            z-index: 1;
            background:
                linear-gradient(135deg, rgba(7, 52, 66, 0.98), rgba(7, 88, 106, 0.94));
            color: white;
            padding: 42px 20px;
            text-align: center;
            margin-top: auto;
            border-top: 1px solid rgba(117, 215, 239, 0.24);
        }

        footer p {
            margin: 0;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .page-title {
                font-size: 1.8rem;
            }

            main {
                padding-bottom: 42px;
            }
        }

        @media (max-width: 991.98px) {
            .navbar {
                min-height: 60px;
            }

            .navbar .container-fluid {
                padding-left: 14px;
                padding-right: 14px;
            }

            .navbar-brand {
                font-size: 1.12rem;
                gap: 8px;
            }

            .navbar-toggler {
                border: 1px solid rgba(174, 239, 255, 0.28);
                border-radius: var(--radius);
                padding: 7px 9px;
            }

            .navbar-collapse {
                margin-top: 12px;
                padding: 10px 0 12px;
                border-top: 1px solid rgba(174, 239, 255, 0.16);
            }

            .navbar-nav {
                gap: 4px;
            }

            .nav-link {
                width: 100%;
                padding: 11px 12px !important;
            }

            .dropdown-menu {
                position: static !important;
                transform: none !important;
                width: 100%;
                margin-top: 6px;
                background: rgba(255, 255, 255, 0.96);
                box-shadow: none;
            }
        }

        @media (max-width: 767.98px) {
            body {
                background-attachment: scroll;
            }

            body::before {
                background-size: 56px 56px;
                opacity: 0.1;
            }

            .site-main > :not(.bleed):not(.home-hero):not(.home-metrics-wrap):not(.home-announcement):not(.home-section):not(.mission-band) {
                padding-left: 12px;
                padding-right: 12px;
            }

            .site-main > :not(.bleed):not(.home-hero):not(.home-metrics-wrap):not(.home-announcement):not(.home-section):not(.mission-band):first-child {
                margin-top: 22px;
            }

            .page-title {
                font-size: 1.55rem;
                gap: 10px;
                line-height: 1.25;
                flex-wrap: wrap;
                margin-bottom: 8px;
            }

            .page-subtitle {
                font-size: 0.98rem;
                line-height: 1.55;
                margin-bottom: 22px;
            }

            .card {
                margin-bottom: 14px;
            }

            .card-header {
                padding: 14px 16px;
            }

            .card-body {
                padding: 16px;
            }

            .shell-card,
            .feature-card,
            .dashboard-card,
            .level-panel {
                padding: 16px !important;
            }

            .btn {
                min-height: 42px;
                padding: 9px 13px;
            }

            .btn-sm {
                min-height: 36px;
                padding: 7px 10px;
            }

            .form-control,
            .form-select {
                min-height: 44px;
                font-size: 16px;
                padding: 10px 12px;
            }

            textarea.form-control {
                min-height: 118px;
            }

            .input-group {
                align-items: stretch;
            }

            .table-responsive {
                border: 1px solid var(--border-soft);
                border-radius: var(--radius);
            }

            .table-responsive .table {
                min-width: 680px;
            }

            .modal-dialog {
                margin: 8px;
            }

            .modal-content {
                border-radius: var(--radius);
            }

            .modal-body,
            .modal-footer {
                padding: 16px;
            }

            .modal-footer {
                gap: 8px;
            }

            .card form .d-flex.gap-2 {
                flex-direction: column;
            }

            .card form .d-flex.gap-2 .btn {
                width: 100%;
            }

            .shell-card .d-flex.gap-2 {
                flex-wrap: wrap;
            }

            .shell-card .d-flex.gap-2 .btn {
                flex: 1 1 0;
            }
        }

        @media (hover: none) {
            .card:hover,
            .post-card:hover,
            .spot-card:hover,
            .btn:hover {
                transform: none !important;
            }
        }

        /* 徽章 */
        .badge {
            border-radius: var(--radius-pill);
            padding: 7px 12px;
            font-weight: 600;
        }

        .badge-primary {
            background: var(--brand-deep);
        }

        .badge-success {
            background: var(--brand-mint);
        }

        /* 主题化徽章：替代 Bootstrap 原生 bg-info / bg-warning / bg-secondary */
        .badge-info {
            background: rgba(var(--brand-teal-rgb), 0.12);
            color: var(--brand-deep);
            border: 1px solid rgba(var(--brand-teal-rgb), 0.2);
        }

        .badge-amber {
            background: rgba(var(--brand-amber-rgb), 0.18);
            color: var(--text-amber-dark);
            border: 1px solid rgba(var(--brand-amber-rgb), 0.32);
        }

        .badge-muted {
            background: var(--surface-muted);
            color: var(--text-muted);
            border: 1px solid var(--border-soft);
        }

        /* === 共享芯片组件（替代重复的 species-chip / target-species-chip）=== */
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 12px;
            border-radius: var(--radius-pill);
            border: 1px solid rgba(var(--brand-teal-rgb), 0.2);
            background: rgba(255, 255, 255, 0.82);
            color: var(--text-dark);
            font-size: 0.88rem;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
        }

        .chip:hover:not(.chip--active) {
            border-color: var(--brand-teal);
            background: rgba(255, 255, 255, 0.96);
        }

        .chip--active {
            color: #062b35;
            background: linear-gradient(135deg, #84ddf2, #8de3ca);
            border-color: rgba(var(--brand-teal-rgb), 0.34);
            box-shadow: 0 4px 12px rgba(var(--brand-teal-rgb), 0.16);
        }

        .chip:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }

        /* === 数据卡片：区别于营销用 feature-card（无顶部彩条）=== */
        .data-card {
            border: 1px solid var(--border-soft);
            border-radius: var(--radius);
            background: var(--glass-strong);
            backdrop-filter: blur(10px) saturate(1.04);
            box-shadow: var(--shadow-soft);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            overflow: hidden;
        }

        .data-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lift);
            border-color: rgba(var(--brand-teal-rgb), 0.28);
        }

        .data-card h5,
        .data-card h6 {
            color: var(--brand-deep);
            font-weight: 700;
        }

        .data-card p {
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 8px;
        }

        /* === 通用媒体缩略图（目录页图片）=== */
        .media-thumb {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: var(--radius);
        }

        /* === 统计磁贴：用于详情页天气 / 数据面板 === */
        .stat-tile {
            padding: 16px;

        .leaflet-container {

        }

        .brand-panel {

                linear-gradient(135deg, rgba(7, 88, 106, 0.96), rgba(14, 143, 163, 0.9));
            border: 1px solid rgba(117, 215, 239, 0.28);

        .empty-state,
        .error-state {
            padding: 42px 24px;
            text-align: center;
            color: var(--text-muted);

            border-radius: var(--radius);
        }

        .error-state {
            color: var(--brand-coral);
            border-color: rgba(200, 90, 66, 0.28);
            background: rgba(255, 248, 245, 0.8);
        }

        /* ================= 视觉升级：字体 / 动画 / 交互 ================= */

        /* 展示字体：中文用 Noto Sans SC，拉丁标题回落到 Fraunces 衬线 */
        .font-display {
            font-family: 'Fraunces', 'Noto Sans SC', 'Microsoft YaHei', serif;
            letter-spacing: 0.01em;
        }

        /* ——— 关键帧：仅 transform / opacity，GPU 安全 ——— */
        @keyframes anglr-ripple {
            0% { transform: translate(-50%, -50%) scale(0.55); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(2.4); opacity: 0; }
        }
        @keyframes anglr-breathe {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.09); opacity: 1; }
        }
        @keyframes anglr-mesh {
            0% { transform: translate3d(0, 0, 0) scale(1); }
            50% { transform: translate3d(4%, -3%, 0) scale(1.12); }
            100% { transform: translate3d(0, 0, 0) scale(1); }
        }
        @keyframes anglr-float-up {
            0% { transform: translateY(0) rotate(0); opacity: 0; }
            12% { opacity: 0.5; }
            100% { transform: translateY(-130px) rotate(45deg); opacity: 0; }
        }
        @keyframes anglr-pulse-dot {
            0%, 100% { box-shadow: 0 0 0 0 rgba(var(--brand-mint-rgb), 0.5); }
            50% { box-shadow: 0 0 0 12px rgba(var(--brand-mint-rgb), 0); }
        }
        @keyframes anglr-fade-in {
            from { opacity: 0; transform: translateY(26px); filter: blur(6px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* ——— 滚动渐显（配合 IntersectionObserver）——— */
        .reveal {
            opacity: 0;
            transform: translateY(26px);
            filter: blur(6px);
            transition: opacity 0.7s cubic-bezier(0.32, 0.72, 0, 1),
                        transform 0.7s cubic-bezier(0.32, 0.72, 0, 1),
                        filter 0.7s cubic-bezier(0.32, 0.72, 0, 1);
            will-change: opacity, transform;
        }
        .reveal.is-visible {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0);
        }

        /* ——— 湖光动态渐变色斑 ——— */
        .anglr-mesh {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }
        .anglr-mesh__blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            animation: anglr-mesh 22s ease-in-out infinite;
        }
        .anglr-mesh__blob--teal {
            top: -18%; left: -12%;
            width: 60vh; height: 60vh;
            background: radial-gradient(circle, var(--brand-mint), transparent 60%);
        }
        .anglr-mesh__blob--deep {
            bottom: -22%; right: -14%;
            width: 72vh; height: 72vh;
            background: radial-gradient(circle, var(--brand-deep), transparent 62%);
            opacity: 0.3;
            animation-duration: 28s;
            animation-direction: reverse;
        }

        /* ——— 自然粒子（≤4，低调）——— */
        .anglr-particles {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }
        .anglr-particles span {
            position: absolute;
            bottom: 0;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(var(--brand-mint-rgb), 0.28);
            animation: anglr-float-up linear infinite;
        }
        .anglr-particles span:nth-child(1) { left: 18%; animation-duration: 13s; animation-delay: 0s; }
        .anglr-particles span:nth-child(2) { left: 42%; animation-duration: 15s; animation-delay: 2.6s; }
        .anglr-particles span:nth-child(3) { left: 66%; animation-duration: 17s; animation-delay: 5.2s; }
        .anglr-particles span:nth-child(4) { left: 84%; animation-duration: 19s; animation-delay: 7.8s; }

        /* ——— 水波纹（同心圆呼吸扩散）——— */
        .anglr-ripple {
            position: absolute;
            pointer-events: none;
            z-index: 0;
        }
        .anglr-ripple span {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 1px solid rgba(var(--brand-mint-rgb), 0.42);
            animation: anglr-ripple 8s ease-out infinite;
        }
        .anglr-ripple span:nth-child(2) { animation-delay: 2.6s; }
        .anglr-ripple span:nth-child(3) { animation-delay: 5.2s; }

        /* ——— 呼吸图标 / 脉冲点 工具类 ——— */
        .anglr-breathe { animation: anglr-breathe 3.6s ease-in-out infinite; }
        .anglr-pulse-dot { animation: anglr-pulse-dot 2.4s infinite; }

        /* ——— 深色模式浮动切换按钮 ——— */
        .theme-toggle {
            position: fixed;
            right: clamp(16px, 3vw, 30px);
            bottom: clamp(16px, 3vw, 30px);
            z-index: 1060;
            width: 52px;
            height: 52px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-pill);
            background: var(--glass-strong);
            backdrop-filter: blur(14px) saturate(1.1);
            color: var(--brand-deep);
            font-size: 1.16rem;
            box-shadow: var(--shadow-strong);
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1), box-shadow 0.3s ease, color 0.3s ease;
        }
        .theme-toggle:hover {
            transform: translateY(-3px) scale(1.04);
            color: var(--brand-teal);
            box-shadow: var(--shadow-lift);
        }
        .theme-toggle:active { transform: scale(0.94); }
        .theme-toggle .fa-sun { display: none; }
        html.dark .theme-toggle .fa-sun { display: inline-block; }
        html.dark .theme-toggle .fa-moon { display: none; }

        /* ================= 深色模式 · Bootstrap 兼容层 =================
           Bootstrap 的 .card / .text-muted 等把文字色写死为浅色主题下的深灰
           （如 .card{color:var(--bs-body-color)=#212529}），在深色卡面上会
           出现“深字压深底”不可读。这里统一改用主题 token 覆盖。 */
        html.dark {
            --bs-body-color: var(--text-dark);
            --bs-body-bg: var(--surface);
            --bs-secondary-color: var(--text-muted);
            --bs-emphasis-color: var(--text-dark);
            --bs-border-color: var(--border-soft);
        }
        html.dark .card,
        html.dark .card-body,
        html.dark .card-footer,
        html.dark .data-card,
        html.dark .shell-card,
        html.dark .feature-card {
            color: var(--text-dark);
        }
        /* Bootstrap 文字工具类：深色下改用可读的主题色 */
        html.dark .text-muted,
        html.dark .text-secondary,
        html.dark small.text-muted,
        html.dark .form-text.text-muted {
            color: var(--text-muted) !important;
        }
        html.dark .text-dark,
        html.dark .text-body,
        html.dark .text-body-emphasis {
            color: var(--text-dark) !important;
        }
        /* 卡片内 <strong> 标签文字（位置/水体/坐标 等）——保持标题绿以区分层级 */
        html.dark .card-body strong,
        html.dark .card-body b {
            color: var(--brand-deep);
        }
        /* 分隔线、alert 在深色下的可读性 */
        html.dark hr { border-color: var(--border-soft); opacity: 0.6; }
        html.dark .alert-info {
            background: rgba(var(--brand-mint-rgb), 0.12);
            border-color: rgba(var(--brand-mint-rgb), 0.28);
            color: var(--text-dark);
        }
        html.dark .badge-info {
            background: rgba(var(--brand-mint-rgb), 0.16);
            color: var(--brand-deep);
            border-color: rgba(var(--brand-mint-rgb), 0.3);
        }
        /* 输入框深色适配 */
        html.dark .form-control,
        html.dark .form-select {
            background: var(--surface-soft);
            color: var(--text-dark);
            border-color: var(--border-soft);
        }
        html.dark .form-control::placeholder { color: var(--text-muted); }

        @media (prefers-reduced-motion: reduce) {
            .reveal { opacity: 1 !important; transform: none !important; filter: none !important; transition: none !important; }
            .anglr-mesh__blob,
            .anglr-particles span,
            .anglr-ripple span,
            .anglr-breathe,
            .anglr-pulse-dot { animation: none !important; }
        }
    </style>
    {% block extra_css %}{% endblock %}

    <script>
        // ——— 深色模式切换（首帧已在 <head> 预应用，此处仅处理点击）———
        (function () {
            const toggle = document.getElementById('themeToggle');
            if (!toggle) return;
            toggle.addEventListener('click', function () {
                const isDark = document.documentElement.classList.toggle('dark');
                try { localStorage.setItem('anglr-theme', isDark ? 'dark' : 'light'); } catch (e) {}
            });
        })();

        // ——— 全局滚动渐显：给任意 .reveal 元素加 is-visible ———
        window.AnglrReveal = function (root) {
            const scope = root || document;
            const targets = scope.querySelectorAll('.reveal:not(.is-visible)');
            if (!targets.length) return;
            if (!('IntersectionObserver' in window)) {
                targets.forEach(el => el.classList.add('is-visible'));
                return;
            }
            const io = new IntersectionObserver(function (entries, obs) {
                entries.forEach(function (entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                        obs.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.12, rootMargin: '0px 0px -80px 0px' });
            targets.forEach(el => io.observe(el));
        };
        document.addEventListener('DOMContentLoaded', function () { window.AnglrReveal(); });

        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            const authNav = document.getElementById('authNav');
            const spotsNav = document.getElementById('spotsNav');
            const levelNav = document.getElementById('levelNav');
            const adminNav = document.getElementById('adminNav');

                        <li><a class="dropdown-item" href="/level"><i class="fas fa-ranking-star"></i> 我的等级</a></li>
                        <li><a class="dropdown-item" href="/leaderboards"><i class="fas fa-trophy"></i> 排行榜</a></li>
                        <li><a class="dropdown-item" href="/equipment"><i class="fas fa-toolbox"></i> 我的装备</a></li>
                        <li><hr class="dropdown-divider"></li>

                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 退出登录</a></li>
                    </ul>
                `;
                authNav.classList.add('dropdown');
                // 显示钓点管理链接
                if (spotsNav) {
                    spotsNav.style.display = 'block';
                }
                if (levelNav) {
                    levelNav.style.display = 'block';
                }
                apiFetch('/api/auth/me')
                    .then(user => {
                        if (adminNav && user.is_admin) {
                            adminNav.style.display = 'block';
                        }
                    })
                    .catch(() => {
                        if (adminNav) {
                            adminNav.style.display = 'none';

                    });
            } else {
                // 隐藏需要登录的菜单项
                if (spotsNav) {
                    spotsNav.style.display = 'none';
                }
                if (levelNav) {
                    levelNav.style.display = 'none';
                }
                if (adminNav) {
                    adminNav.style.display = 'none';
                }
            }
        });

        function logout() {
            localStorage.removeItem('token');
            alert('已退出登录');
            window.location.href = '/';
        }

        async function parseApiError(response) {
            const fallback = `请求失败（HTTP ${response.status}）`;
            try {
                const payload = await response.json();
                if (Array.isArray(payload.detail)) {
                    return payload.detail.map(item => item.msg || JSON.stringify(item)).join('；') || fallback;
                }
                if (payload.detail) return payload.detail;
                if (payload.error) return payload.error;
                if (payload.message) return payload.message;
                return fallback;
            } catch (error) {
                return fallback;
            }
        }

        async function apiFetch(url, options = {}) {
            const headers = new Headers(options.headers || {});
            const token = localStorage.getItem('token');
            if (token && !headers.has('Authorization')) {
                headers.set('Authorization', `Bearer ${token}`);
            }

            const response = await fetch(url, {
                ...options,
                headers
            });

            if (response.status === 401 || (response.status === 404 && url.includes('/api/auth/me'))) {
                localStorage.removeItem('token');
                throw new Error('登录状态已失效，请重新登录');
            }

            if (!response.ok) {
                throw new Error(await parseApiError(response));
            }

            if (response.status === 204) {
                return null;
            }

            const contentType = response.headers.get('content-type') || '';
            if (!contentType.includes('application/json')) {
                return response.text();
            }
            return response.json();
        }

        function redirectToLogin(message) {
            if (message) alert(message);
            window.location.href = '/login';

        window.AnglrMap = (function() {
            const PI = Math.PI;
            const A = 6378245.0;
            const EE = 0.00669342162296594323;

            function outOfChina(lng, lat) {
                return lng < 72.004 || lng > 137.8347 || lat < 0.8293 || lat > 55.8271;
            }

            function transformLat(x, y) {
                let ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
                ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
                ret += (20.0 * Math.sin(y * PI) + 40.0 * Math.sin(y / 3.0 * PI)) * 2.0 / 3.0;
                ret += (160.0 * Math.sin(y / 12.0 * PI) + 320 * Math.sin(y * PI / 30.0)) * 2.0 / 3.0;
                return ret;
            }

            function transformLng(x, y) {
                let ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
                ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
                ret += (20.0 * Math.sin(x * PI) + 40.0 * Math.sin(x / 3.0 * PI)) * 2.0 / 3.0;
                ret += (150.0 * Math.sin(x / 12.0 * PI) + 300.0 * Math.sin(x / 30.0 * PI)) * 2.0 / 3.0;
                return ret;
            }

            function wgs84ToGcj02(lat, lng) {
                lat = Number(lat);
                lng = Number(lng);
                if (!Number.isFinite(lat) || !Number.isFinite(lng) || outOfChina(lng, lat)) {
                    return { lat, lng };
                }

                let dLat = transformLat(lng - 105.0, lat - 35.0);
                let dLng = transformLng(lng - 105.0, lat - 35.0);
                const radLat = lat / 180.0 * PI;
                let magic = Math.sin(radLat);
                magic = 1 - EE * magic * magic;
                const sqrtMagic = Math.sqrt(magic);
                dLat = (dLat * 180.0) / ((A * (1 - EE)) / (magic * sqrtMagic) * PI);
                dLng = (dLng * 180.0) / (A / sqrtMagic * Math.cos(radLat) * PI);
                return { lat: lat + dLat, lng: lng + dLng };
            }

            function createTileLayer() {
                return L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
                    subdomains: ['1', '2', '3', '4'],
                    attribution: '© 高德地图',
                    maxZoom: 19
                });
            }

            function createMap(containerId, options = {}) {
                const center = options.center || [31.2304, 121.4737];
                const zoom = options.zoom || 12;
                const map = L.map(containerId, {
                    zoomControl: options.zoomControl !== false,
                    scrollWheelZoom: options.scrollWheelZoom !== false
                }).setView(center, zoom);
                createTileLayer().addTo(map);
                return map;
            }

            function formatDistance(meters) {
                if (!Number.isFinite(meters)) return '未知距离';
                if (meters < 1000) return `${Math.round(meters)} m`;
                return `${(meters / 1000).toFixed(meters < 10000 ? 1 : 0)} km`;
            }

            function distanceMeters(lat1, lng1, lat2, lng2) {
                const toRad = value => value * PI / 180;
                const radius = 6371008.8;
                const dLat = toRad(Number(lat2) - Number(lat1));
                const dLng = toRad(Number(lng2) - Number(lng1));
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2)
                    + Math.cos(toRad(Number(lat1))) * Math.cos(toRad(Number(lat2)))
                    * Math.sin(dLng / 2) * Math.sin(dLng / 2);
                return 2 * radius * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            }

            function amapMarkerUrl(lat, lng, name) {
                return `https://uri.amap.com/marker?position=${encodeURIComponent(lng)},${encodeURIComponent(lat)}&name=${encodeURIComponent(name || '位置')}`;
            }

            function canPromptForLocation() {
                const host = window.location.hostname;
                return window.isSecureContext || host === 'localhost' || host === '127.0.0.1' || host === '::1';
            }

            function getLocationPermissionState() {
                if (!navigator.permissions || !navigator.permissions.query) {
                    return Promise.resolve('unknown');
                }

                return navigator.permissions.query({ name: 'geolocation' })
                    .then(result => result.state)
                    .catch(() => 'unknown');
            }

            return {
                createMap,
                createTileLayer,
                wgs84ToGcj02,
                formatDistance,
                distanceMeters,
                amapMarkerUrl,
                canPromptForLocation,
                getLocationPermissionState
            };
        })();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
