<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AnglrLog - 钓鱼记录{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <style>
        :root {
            --brand-ink: #073642;
            --brand-deep: #07586a;
            --brand-teal: #0e8fa3;
            --brand-mint: #57c7a6;
            --brand-amber: #eab75d;
            --brand-coral: #e96f5b;
            --brand-electric: #75d7ef;
            --sky-wash: #e4f8ff;
            --sky-soft: #f1fbff;
            --surface: #ffffff;
            --surface-soft: #eefaff;
            --surface-tint: #dff6ff;
            --surface-warm: #fff8e8;
            --glass-strong: rgba(255, 255, 255, 0.92);
            --glass-dark: rgba(6, 72, 88, 0.9);
            --border-soft: rgba(89, 169, 188, 0.24);
            --border-strong: rgba(7, 88, 106, 0.18);
            --text-dark: #14343d;
            --text-muted: #5d737a;
            --primary-blue: var(--brand-teal);
            --secondary-blue: var(--brand-deep);
            --shadow-soft: 0 14px 34px rgba(8, 88, 106, 0.08);
            --shadow-strong: 0 22px 54px rgba(8, 88, 106, 0.14);
            --shadow-lift: 0 10px 22px rgba(8, 88, 106, 0.11);
            --focus-ring: 0 0 0 0.2rem rgba(14, 143, 163, 0.16);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background:
                linear-gradient(180deg, rgba(228, 248, 255, 0.96) 0%, rgba(241, 251, 255, 0.98) 42%, rgba(250, 254, 255, 1) 100%),
                url('/static/fishing-lake-bg.svg') center top / cover fixed no-repeat;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            isolation: isolate;
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            inset: 0;
            opacity: 0.16;
            background-image:
                linear-gradient(90deg, rgba(7, 88, 106, 0.08) 1px, transparent 1px),
                linear-gradient(180deg, rgba(7, 88, 106, 0.06) 1px, transparent 1px);
            background-size: 84px 84px;
            mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.5), transparent 72%);
        }

        body::after {
            display: none;
        }

        /* 导航栏 */
        .navbar {
            position: relative;
            z-index: 4;
            background: linear-gradient(90deg, rgba(7, 52, 66, 0.96), rgba(7, 88, 106, 0.94));
            backdrop-filter: blur(18px) saturate(1.15);
            box-shadow: 0 10px 28px rgba(7, 52, 66, 0.18);
            border-bottom: 1px solid rgba(117, 215, 239, 0.22);
            min-height: 68px;
        }

        .navbar .container-fluid {
            max-width: 1480px;
            padding-left: clamp(18px, 4vw, 56px);
            padding-right: clamp(18px, 4vw, 56px);
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.36rem;
            color: white !important;
            display: flex;
            align-items: center;
            gap: 11px;
            letter-spacing: 0;
        }

        .navbar-brand i {
            color: #aeefff;
            font-size: 1.5rem;
            filter: none;
        }

        .nav-link {
            color: rgba(239, 254, 250, 0.86) !important;
            font-weight: 500;
            transition: color 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            border-radius: 8px;
            padding: 9px 12px !important;
        }

        .nav-link:hover {
            color: #ffffff !important;
            background: rgba(174, 239, 255, 0.12);
            box-shadow: inset 0 0 0 1px rgba(174, 239, 255, 0.2);
        }

        .nav-link::after {
            display: none;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* 主容器 */
        main {
            flex: 1;
            padding: 0 0 64px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .container {
            max-width: 1280px;
        }

        .site-main > :not(.bleed):not(.home-hero):not(.home-metrics-wrap):not(.home-announcement):not(.home-section):not(.mission-band) {
            max-width: 1280px;
            margin-left: auto;
            margin-right: auto;
            padding-left: clamp(16px, 3vw, 28px);
            padding-right: clamp(16px, 3vw, 28px);
        }

        .site-main > :not(.bleed):not(.home-hero):not(.home-metrics-wrap):not(.home-announcement):not(.home-section):not(.mission-band):first-child {
            margin-top: clamp(32px, 5vw, 56px);
        }

        /* 页面标题 */
        .page-title {
            font-size: clamp(1.9rem, 3.8vw, 3rem);
            font-weight: 900;
            color: var(--brand-deep);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            letter-spacing: 0;
        }

        .page-title i {
            color: var(--brand-teal);
            font-size: 0.92em;
            filter: none;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 1.12rem;
            margin-bottom: 34px;
        }

        /* 卡片 */
        .card {
            border: 1px solid var(--border-soft);
            border-radius: 8px;
            box-shadow: var(--shadow-soft);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            overflow: hidden;
            margin-bottom: 20px;
            background: var(--glass-strong);
            backdrop-filter: blur(10px) saturate(1.04);
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-strong);
            border-color: rgba(14, 143, 163, 0.34);
        }

        .card-header {
            background:
                linear-gradient(135deg, #07586a, #0e8fa3);
            color: white;
            border: none;
            font-weight: 600;
            padding: 18px 22px;
        }

        .card-body {
            padding: 25px;
        }

        /* 按钮 */
        .btn {
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            border: none;
            padding: 10px 18px;
        }

        .btn-primary {
            color: #062b35;
            background: linear-gradient(135deg, #84ddf2, #8de3ca);
            box-shadow: 0 10px 22px rgba(14, 143, 163, 0.18);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            color: #062b35;
            box-shadow: 0 14px 30px rgba(14, 143, 163, 0.24);
            background: linear-gradient(135deg, #b8f1ff, #a9eedc);
        }

        .btn-success {
            color: #073642;
            background: linear-gradient(135deg, #67d8b4, #c6e77b);
            box-shadow: 0 10px 22px rgba(87, 199, 166, 0.18);
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #54c6a0, #b9dc69);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(52, 178, 123, 0.24);
        }

        .btn-danger {
            background: #e96f5b;
            color: #fff;
        }

        .btn-danger:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .btn-outline-primary {
            color: var(--brand-teal);
            border: 1px solid rgba(14, 143, 163, 0.34);
            background: rgba(255, 255, 255, 0.72);
        }

        .btn-outline-primary:hover {
            color: #fff;
            background: var(--brand-teal);
            box-shadow: 0 10px 22px rgba(22, 115, 122, 0.18);
        }

        .btn-outline-secondary {
            color: var(--brand-deep);
            border: 1px solid var(--border-soft);
            background: rgba(255, 255, 255, 0.78);
        }

        .btn-secondary {
            color: var(--brand-deep);
            background: #e8f6fb;
            border: 1px solid var(--border-soft);
        }

        .btn-secondary:hover {
            color: var(--brand-deep);
            background: #f5fcff;
            box-shadow: var(--shadow-lift);
        }

        .btn-outline-secondary:hover {
            color: var(--brand-deep);
            background: #fff;
            box-shadow: 0 10px 22px rgba(18, 53, 59, 0.1);
        }

        /* 输入框 */
        .form-control, .form-select {
            border: 1px solid var(--border-soft);
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            background: rgba(255, 255, 255, 0.94);
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--brand-teal);
            box-shadow: var(--focus-ring);
        }

        .input-group .form-control {
            min-height: 46px;
        }

        .dropdown-menu {
            border: 1px solid var(--border-soft);
            border-radius: 8px;
            box-shadow: var(--shadow-strong);
            padding: 8px;
        }

        .dropdown-item {
            border-radius: 6px;
            color: var(--text-dark);
            padding: 9px 12px;
        }

        .dropdown-item:hover,
        .dropdown-item:focus {
            color: var(--brand-deep);
            background: var(--surface-soft);
        }

        .table {
            --bs-table-bg: transparent;
            --bs-table-color: var(--text-dark);
            margin-bottom: 0;
        }

        .table thead th {
            color: var(--brand-deep);
            background: var(--surface-soft);
            border-bottom: 1px solid var(--border-soft);
            font-size: 0.88rem;
            font-weight: 800;
        }

        .table tbody td {
            border-color: rgba(89, 169, 188, 0.16);
        }

        .table-hover tbody tr:hover {
            --bs-table-hover-bg: rgba(223, 246, 255, 0.52);
        }

        .alert {
            border-radius: 8px;
            border: 1px solid var(--border-soft);
            box-shadow: 0 10px 24px rgba(8, 88, 106, 0.06);
        }

        .modal {
            z-index: 1080;
        }

        .modal-backdrop {
            z-index: 1070;
        }

        body.modal-open .site-main {
            z-index: auto;
        }

        /* 底部 */
        footer {
            position: relative;
            z-index: 1;
            background:
                linear-gradient(135deg, rgba(7, 52, 66, 0.98), rgba(7, 88, 106, 0.94));
            color: white;
            padding: 42px 20px;
            text-align: center;
            margin-top: auto;
            border-top: 1px solid rgba(117, 215, 239, 0.24);
        }

        footer p {
            margin: 0;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .page-title {
                font-size: 1.8rem;
            }

            main {
                padding-bottom: 42px;
            }
        }

        @media (max-width: 991.98px) {
            .navbar {
                min-height: 60px;
            }

            .navbar .container-fluid {
                padding-left: 14px;
                padding-right: 14px;
            }

            .navbar-brand {
                font-size: 1.12rem;
                gap: 8px;
            }

            .navbar-toggler {
                border: 1px solid rgba(174, 239, 255, 0.28);
                border-radius: 8px;
                padding: 7px 9px;
            }

            .navbar-collapse {
                margin-top: 12px;
                padding: 10px 0 12px;
                border-top: 1px solid rgba(174, 239, 255, 0.16);
            }

            .navbar-nav {
                gap: 4px;
            }

            .nav-link {
                width: 100%;
                padding: 11px 12px !important;
            }

            .dropdown-menu {
                position: static !important;
                transform: none !important;
                width: 100%;
                margin-top: 6px;
                background: rgba(255, 255, 255, 0.96);
                box-shadow: none;
            }
        }

        @media (max-width: 767.98px) {
            body {
                background-attachment: scroll;
            }

            body::before {
                background-size: 56px 56px;
                opacity: 0.1;
            }

            .site-main > :not(.bleed):not(.home-hero):not(.home-metrics-wrap):not(.home-announcement):not(.home-section):not(.mission-band) {
                padding-left: 12px;
                padding-right: 12px;
            }

            .site-main > :not(.bleed):not(.home-hero):not(.home-metrics-wrap):not(.home-announcement):not(.home-section):not(.mission-band):first-child {
                margin-top: 22px;
            }

            .page-title {
                font-size: 1.55rem;
                gap: 10px;
                line-height: 1.25;
                flex-wrap: wrap;
                margin-bottom: 8px;
            }

            .page-subtitle {
                font-size: 0.98rem;
                line-height: 1.55;
                margin-bottom: 22px;
            }

            .card {
                margin-bottom: 14px;
            }

            .card-header {
                padding: 14px 16px;
            }

            .card-body {
                padding: 16px;
            }

            .shell-card,
            .feature-card,
            .dashboard-card,
            .level-panel {
                padding: 16px !important;
            }

            .btn {
                min-height: 42px;
                padding: 9px 13px;
            }

            .btn-sm {
                min-height: 36px;
                padding: 7px 10px;
            }

            .form-control,
            .form-select {
                min-height: 44px;
                font-size: 16px;
                padding: 10px 12px;
            }

            textarea.form-control {
                min-height: 118px;
            }

            .input-group {
                align-items: stretch;
            }

            .table-responsive {
                border: 1px solid var(--border-soft);
                border-radius: 8px;
            }

            .table-responsive .table {
                min-width: 680px;
            }

            .modal-dialog {
                margin: 8px;
            }

            .modal-content {
                border-radius: 8px;
            }

            .modal-body,
            .modal-footer {
                padding: 16px;
            }

            .modal-footer {
                gap: 8px;
            }

            .card form .d-flex.gap-2 {
                flex-direction: column;
            }

            .card form .d-flex.gap-2 .btn {
                width: 100%;
            }

            .shell-card .d-flex.gap-2 {
                flex-wrap: wrap;
            }

            .shell-card .d-flex.gap-2 .btn {
                flex: 1 1 0;
            }
        }

        @media (hover: none) {
            .card:hover,
            .post-card:hover,
            .spot-card:hover,
            .btn:hover {
                transform: none !important;
            }
        }

        /* 徽章 */
        .badge {
            border-radius: 999px;
            padding: 7px 12px;
            font-weight: 600;
        }

        .badge-primary {
            background: var(--brand-deep);
        }

        .badge-success {
            background: var(--brand-mint);
        }

        /* 装饰线 */
        .divider {
            height: 2px;
            background: linear-gradient(to right, transparent, var(--brand-electric), var(--brand-mint), var(--brand-amber), transparent);
            margin: 20px 0;
        }

        .leaflet-container {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
        }

        .brand-panel {
            background:
                linear-gradient(135deg, rgba(7, 88, 106, 0.96), rgba(14, 143, 163, 0.9));
            border: 1px solid rgba(117, 215, 239, 0.28);
            border-radius: 8px;
            color: #fff;
            box-shadow: var(--shadow-strong);
            overflow: hidden;
            position: relative;
        }

        .brand-panel__icon {
            color: var(--brand-electric);
            filter: none;
        }

        .shell-card {
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid var(--border-soft);
            border-radius: 8px;
            box-shadow: var(--shadow-soft);
            overflow: hidden;
        }

        .feature-card {
            height: 100%;
            padding: 26px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px) saturate(1.04);
            border: 1px solid var(--border-soft);
            border-top: 4px solid var(--brand-electric);
            border-radius: 8px;
            box-shadow: var(--shadow-soft);
        }

        .feature-card--mint {
            border-top-color: var(--brand-mint);
        }

        .feature-card--amber {
            border-top-color: var(--brand-amber);
        }

        .feature-card--coral {
            border-top-color: var(--brand-coral);
        }

        .feature-card__icon {
            color: var(--brand-teal);
            font-size: 2.1rem;
            margin-bottom: 12px;
        }

        .feature-card--mint .feature-card__icon {
            color: var(--brand-mint);
        }

        .feature-card--amber .feature-card__icon {
            color: var(--brand-amber);
        }

        .feature-card--coral .feature-card__icon {
            color: var(--brand-coral);
        }

        .feature-card h5,
        .feature-card h6 {
            color: var(--brand-deep);
            font-weight: 700;
        }

        .feature-card p {
            color: var(--text-muted);
            line-height: 1.75;
            margin-bottom: 0;
        }

        .auth-wrap {
            min-height: 540px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid var(--border-soft);
            border-radius: 8px;
            box-shadow: var(--shadow-strong);
            overflow: hidden;
        }

        .auth-card__head {
            padding: 42px 24px;
            text-align: center;
        }

        .auth-card__head i {
            color: var(--brand-amber);
            font-size: 3.4rem;
            margin-bottom: 14px;
        }

        .auth-card__body {
            padding: 34px 28px;
        }

        .form-label {
            color: var(--brand-deep);
            font-weight: 700;
        }

        .soft-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            font-size: 0.88rem;
            margin: 22px 0;
        }

        .soft-divider::before,
        .soft-divider::after {
            content: "";
            height: 1px;
            flex: 1;
            background: var(--border-soft);
        }

        .text-link {
            color: var(--brand-teal);
            font-weight: 700;
            text-decoration: none;
        }

        .text-link:hover {
            color: var(--brand-deep);
        }

        .empty-state,
        .error-state {
            padding: 42px 24px;
            text-align: center;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.7);
            border: 1px dashed var(--border-soft);
            border-radius: 8px;
        }

        .error-state {
            color: var(--brand-coral);
            border-color: rgba(200, 90, 66, 0.28);
            background: rgba(255, 248, 245, 0.8);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-fish"></i> AnglrLog
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            <i class="fas fa-home"></i> 首页
                        </a>
                    </li>
                    <li class="nav-item" id="spotsNav">
                        <a class="nav-link" href="/spots">
                            <i class="fas fa-map-location-dot"></i> 我的钓点
                        </a>
                    </li>
                    <li class="nav-item" id="levelNav" style="display: none;">
                        <a class="nav-link" href="/level">
                            <i class="fas fa-ranking-star"></i> 我的等级
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/forum">
                            <i class="fas fa-comments"></i> 讨论专区
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/leaderboards">
                            <i class="fas fa-trophy"></i> 排行榜
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about">
                            <i class="fas fa-info-circle"></i> 关于
                        </a>
                    </li>
                    <li class="nav-item" id="adminNav" style="display: none;">
                        <a class="nav-link" href="/admin/users">
                            <i class="fas fa-user-shield"></i> 用户管理
                        </a>
                    </li>
                    <li class="nav-item" id="authNav">
                        <a class="nav-link" href="/login">
                            <i class="fas fa-sign-in-alt"></i> 登录
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>
            <i class="fas fa-copyright"></i> 2026 AnglrLog - 专业钓鱼记录工具
        </p>
        <p style="font-size: 0.9rem; margin-top: 10px;">
            记录每一次出钓，积累渔获经验
        </p>
        <p style="font-size: 0.85rem; margin-top: 10px; line-height: 1.8;">
            京ICP备2026039833号-1 | 京公网安备11011302008165号
        </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/htmx/1.9.10/htmx.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            const authNav = document.getElementById('authNav');
            const spotsNav = document.getElementById('spotsNav');
            const levelNav = document.getElementById('levelNav');
            const adminNav = document.getElementById('adminNav');

            if (token && authNav) {
                authNav.innerHTML = `
                    <a class="nav-link dropdown-toggle" href="#" id="userMenu" role="button" data-bs-toggle="dropdown">
                        <i class="fas fa-user-circle"></i> 账户
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/profile"><i class="fas fa-id-card"></i> 个人中心</a></li>
                        <li><a class="dropdown-item" href="/records"><i class="fas fa-clipboard-list"></i> 我的记录</a></li>
                        <li><a class="dropdown-item" href="/level"><i class="fas fa-ranking-star"></i> 我的等级</a></li>
                        <li><a class="dropdown-item" href="/leaderboards"><i class="fas fa-trophy"></i> 排行榜</a></li>
                        <li><a class="dropdown-item" href="/equipment"><i class="fas fa-toolbox"></i> 我的装备</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="/species"><i class="fas fa-fish"></i> 鱼种库</a></li>
                        <li><a class="dropdown-item" href="/baits"><i class="fas fa-worm"></i> 饵料库</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 退出登录</a></li>
                    </ul>
                `;
                authNav.classList.add('dropdown');
                // 显示钓点管理链接
                if (spotsNav) {
                    spotsNav.style.display = 'block';
                }
                if (levelNav) {
                    levelNav.style.display = 'block';
                }
                apiFetch('/api/auth/me')
                    .then(user => {
                        if (adminNav && user.is_admin) {
                            adminNav.style.display = 'block';
                        }
                    })
                    .catch(() => {
                        if (adminNav) {
                            adminNav.style.display = 'none';
                        }
                    });
            } else {
                // 隐藏需要登录的菜单项
                if (spotsNav) {
                    spotsNav.style.display = 'none';
                }
                if (levelNav) {
                    levelNav.style.display = 'none';
                }
                if (adminNav) {
                    adminNav.style.display = 'none';
                }
            }
        });

        function logout() {
            localStorage.removeItem('token');
            alert('已退出登录');
            window.location.href = '/';
        }

        async function parseApiError(response) {
            const fallback = `请求失败（HTTP ${response.status}）`;
            try {
                const payload = await response.json();
                if (Array.isArray(payload.detail)) {
                    return payload.detail.map(item => item.msg || JSON.stringify(item)).join('；') || fallback;
                }
                if (payload.detail) return payload.detail;
                if (payload.error) return payload.error;
                if (payload.message) return payload.message;
                return fallback;
            } catch (error) {
                return fallback;
            }
        }

        async function apiFetch(url, options = {}) {
            const headers = new Headers(options.headers || {});
            const token = localStorage.getItem('token');
            if (token && !headers.has('Authorization')) {
                headers.set('Authorization', `Bearer ${token}`);
            }

            const response = await fetch(url, {
                ...options,
                headers
            });

            if (response.status === 401 || (response.status === 404 && url.includes('/api/auth/me'))) {
                localStorage.removeItem('token');
                throw new Error('登录状态已失效，请重新登录');
            }

            if (!response.ok) {
                throw new Error(await parseApiError(response));
            }

            if (response.status === 204) {
                return null;
            }

            const contentType = response.headers.get('content-type') || '';
            if (!contentType.includes('application/json')) {
                return response.text();
            }
            return response.json();
        }

        function redirectToLogin(message) {
            if (message) alert(message);
            window.location.href = '/login';
        }

        window.AnglrMap = (function() {
            const PI = Math.PI;
            const A = 6378245.0;
            const EE = 0.00669342162296594323;

            function outOfChina(lng, lat) {
                return lng < 72.004 || lng > 137.8347 || lat < 0.8293 || lat > 55.8271;
            }

            function transformLat(x, y) {
                let ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
                ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
                ret += (20.0 * Math.sin(y * PI) + 40.0 * Math.sin(y / 3.0 * PI)) * 2.0 / 3.0;
                ret += (160.0 * Math.sin(y / 12.0 * PI) + 320 * Math.sin(y * PI / 30.0)) * 2.0 / 3.0;
                return ret;
            }

            function transformLng(x, y) {
                let ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
                ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
                ret += (20.0 * Math.sin(x * PI) + 40.0 * Math.sin(x / 3.0 * PI)) * 2.0 / 3.0;
                ret += (150.0 * Math.sin(x / 12.0 * PI) + 300.0 * Math.sin(x / 30.0 * PI)) * 2.0 / 3.0;
                return ret;
            }

            function wgs84ToGcj02(lat, lng) {
                lat = Number(lat);
                lng = Number(lng);
                if (!Number.isFinite(lat) || !Number.isFinite(lng) || outOfChina(lng, lat)) {
                    return { lat, lng };
                }

                let dLat = transformLat(lng - 105.0, lat - 35.0);
                let dLng = transformLng(lng - 105.0, lat - 35.0);
                const radLat = lat / 180.0 * PI;
                let magic = Math.sin(radLat);
                magic = 1 - EE * magic * magic;
                const sqrtMagic = Math.sqrt(magic);
                dLat = (dLat * 180.0) / ((A * (1 - EE)) / (magic * sqrtMagic) * PI);
                dLng = (dLng * 180.0) / (A / sqrtMagic * Math.cos(radLat) * PI);
                return { lat: lat + dLat, lng: lng + dLng };
            }

            function createTileLayer() {
                return L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
                    subdomains: ['1', '2', '3', '4'],
                    attribution: '© 高德地图',
                    maxZoom: 19
                });
            }

            function createMap(containerId, options = {}) {
                const center = options.center || [31.2304, 121.4737];
                const zoom = options.zoom || 12;
                const map = L.map(containerId, {
                    zoomControl: options.zoomControl !== false,
                    scrollWheelZoom: options.scrollWheelZoom !== false
                }).setView(center, zoom);
                createTileLayer().addTo(map);
                return map;
            }

            function formatDistance(meters) {
                if (!Number.isFinite(meters)) return '未知距离';
                if (meters < 1000) return `${Math.round(meters)} m`;
                return `${(meters / 1000).toFixed(meters < 10000 ? 1 : 0)} km`;
            }

            function distanceMeters(lat1, lng1, lat2, lng2) {
                const toRad = value => value * PI / 180;
                const radius = 6371008.8;
                const dLat = toRad(Number(lat2) - Number(lat1));
                const dLng = toRad(Number(lng2) - Number(lng1));
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2)
                    + Math.cos(toRad(Number(lat1))) * Math.cos(toRad(Number(lat2)))
                    * Math.sin(dLng / 2) * Math.sin(dLng / 2);
                return 2 * radius * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            }

            function amapMarkerUrl(lat, lng, name) {
                return `https://uri.amap.com/marker?position=${encodeURIComponent(lng)},${encodeURIComponent(lat)}&name=${encodeURIComponent(name || '位置')}`;
            }

            function canPromptForLocation() {
                const host = window.location.hostname;
                return window.isSecureContext || host === 'localhost' || host === '127.0.0.1' || host === '::1';
            }

            function getLocationPermissionState() {
                if (!navigator.permissions || !navigator.permissions.query) {
                    return Promise.resolve('unknown');
                }

                return navigator.permissions.query({ name: 'geolocation' })
                    .then(result => result.state)
                    .catch(() => 'unknown');
            }

            return {
                createMap,
                createTileLayer,
                wgs84ToGcj02,
                formatDistance,
                distanceMeters,
                amapMarkerUrl,
                canPromptForLocation,
                getLocationPermissionState
            };
        })();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
