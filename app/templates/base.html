<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FishLog - 钓鱼记录{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <style>
        :root {
            --primary-blue: #1a5f7a;
            --secondary-blue: #2d8fa3;
            --accent-green: #2ecc71;
            --light-blue: #ecf4f7;
            --text-dark: #2c3e50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f9fc 0%, #e8f4f8 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 导航栏 */
        .navbar {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-blue) 100%);
            box-shadow: 0 4px 15px rgba(26, 95, 122, 0.15);
            border-bottom: 3px solid var(--accent-green);
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.8rem;
            color: white !important;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar-brand i {
            font-size: 2rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.8) !important;
            font-weight: 500;
            transition: all 0.3s;
            position: relative;
        }

        .nav-link:hover {
            color: var(--accent-green) !important;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--accent-green);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* 主容器 */
        main {
            flex: 1;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
        }

        /* 页面标题 */
        .page-title {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary-blue);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .page-title i {
            color: var(--accent-green);
            font-size: 2.8rem;
        }

        .page-subtitle {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* 卡片 */
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(26, 95, 122, 0.1);
            transition: all 0.3s ease;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(26, 95, 122, 0.2);
        }

        .card-header {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-blue) 100%);
            color: white;
            border: none;
            font-weight: 600;
        }

        .card-body {
            padding: 25px;
        }

        /* 按钮 */
        .btn {
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            padding: 10px 25px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-blue) 100%);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 95, 122, 0.3);
            background: linear-gradient(135deg, var(--secondary-blue) 0%, var(--primary-blue) 100%);
        }

        .btn-success {
            background: var(--accent-green);
        }

        .btn-success:hover {
            background: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3);
        }

        .btn-danger {
            background: #e74c3c;
        }

        .btn-danger:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        /* 输入框 */
        .form-control, .form-select {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--secondary-blue);
            box-shadow: 0 0 0 0.2rem rgba(45, 143, 163, 0.15);
        }

        /* 底部 */
        footer {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-blue) 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
            margin-top: auto;
            border-top: 3px solid var(--accent-green);
        }

        footer p {
            margin: 0;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .page-title {
                font-size: 1.8rem;
            }

            main {
                padding: 20px 10px;
            }
        }

        /* 徽章 */
        .badge {
            border-radius: 20px;
            padding: 8px 15px;
            font-weight: 600;
        }

        .badge-primary {
            background: var(--primary-blue);
        }

        .badge-success {
            background: var(--accent-green);
        }

        /* 装饰线 */
        .divider {
            height: 2px;
            background: linear-gradient(to right, transparent, var(--accent-green), transparent);
            margin: 20px 0;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-fish"></i> AnglrLog
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            <i class="fas fa-home"></i> 首页
                        </a>
                    </li>
                    <li class="nav-item" id="spotsNav">
                        <a class="nav-link" href="/spots">
                            <i class="fas fa-map-location-dot"></i> 我的钓点
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/forum">
                            <i class="fas fa-comments"></i> 论坛
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about">
                            <i class="fas fa-info-circle"></i> 关于
                        </a>
                    </li>
                    <li class="nav-item" id="authNav">
                        <a class="nav-link" href="/login">
                            <i class="fas fa-sign-in-alt"></i> 登录
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>
            <i class="fas fa-copyright"></i> 2024 AnglrLog - 专业钓鱼记录工具
        </p>
        <p style="font-size: 0.9rem; margin-top: 10px;">
            记录每一次出钓，积累渔获经验 🎣
        </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/htmx/1.9.10/htmx.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            const authNav = document.getElementById('authNav');
            const spotsNav = document.getElementById('spotsNav');

            if (token && authNav) {
                authNav.innerHTML = `
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userMenu" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle"></i> 账户
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 退出登录</a></li>
                        </ul>
                    </li>
                `;
                // 显示钓点管理链接
                if (spotsNav) {
                    spotsNav.style.display = 'block';
                }
            } else {
                // 隐藏需要登录的菜单项
                if (spotsNav) {
                    spotsNav.style.display = 'none';
                }
            }
        });

        function logout() {
            localStorage.removeItem('token');
            alert('已退出登录');
            window.location.href = '/';
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
