{% extends "base.html" %}

{% block title %}钓点管理 - 渔迹录{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="page-title">
        <i class="fas fa-map-location-dot"></i> 钓点管理
    </div>
    <p class="page-subtitle">添加和管理你的钓点</p>

    <!-- 创建新钓点按钮 -->
    <div class="mb-4">
        <button class="btn btn-primary btn-lg" id="addSpotBtn" data-bs-toggle="modal" data-bs-target="#spotModal">
            <i class="fas fa-plus"></i> 新增钓点
        </button>
    </div>

    <!-- 我的钓点列表 -->
    <div class="row" id="mySpots">
        <div class="col-12">
            <div class="text-center py-5">
                <p class="text-muted">
                    <i class="fas fa-spinner fa-spin"></i> 加载中...
                </p>
            </div>
        </div>
    </div>
</div>

<!-- 钓点编辑/新增 Modal -->
<div class="modal fade" id="spotModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="spotModalTitle">
                    <i class="fas fa-plus"></i> 新增钓点
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="spotForm">
                    <!-- 省份和城市选择 -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">
                                <i class="fas fa-map"></i> 省份 <span class="text-danger">*</span>
                            </label>
                            <select class="form-select" id="provinceSelect" required>
                                <option value="">-- 选择省份 --</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">
                                <i class="fas fa-city"></i> 城市 <span class="text-danger">*</span>
                            </label>
                            <select class="form-select" id="citySelect" required>
                                <option value="">-- 先选择省份 --</option>
                            </select>
                        </div>
                    </div>

                    <!-- 钓点名称 -->
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-signature"></i> 钓点名称 <span class="text-danger">*</span>
                        </label>
                        <input type="text" class="form-control" id="spotName" placeholder="例如：某某河、某某湖" required>
                        <small class="form-text text-muted">给你的钓点起个名字</small>
                    </div>

                    <!-- 水体类型 -->
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-water"></i> 水体类型 <span class="text-danger">*</span>
                        </label>
                        <select class="form-select" id="waterType" required>
                            <option value="">-- 选择水体类型 --</option>
                            <option value="river">河流</option>
                            <option value="lake">湖泊</option>
                            <option value="reservoir">水库</option>
                            <option value="sea">海水</option>
                            <option value="pond">池塘</option>
                            <option value="other">其他</option>
                        </select>
                    </div>

                    <!-- 地理坐标 -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">
                                <i class="fas fa-globe"></i> 纬度 <span class="text-danger">*</span>
                            </label>
                            <input type="number" class="form-control" id="latitude" step="0.0001" placeholder="例如：30.2741" required>
                            <small class="form-text text-muted">可在地图上标记</small>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">
                                <i class="fas fa-globe"></i> 经度 <span class="text-danger">*</span>
                            </label>
                            <input type="number" class="form-control" id="longitude" step="0.0001" placeholder="例如：120.1551" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <button type="button" class="btn btn-outline-primary btn-sm" id="useCurrentLocationBtn">
                            <i class="fas fa-location-crosshairs"></i> 使用当前位置
                        </button>
                        <small class="form-text text-muted d-block mt-2" id="locationStatus">
                            将使用浏览器定位，并自动转换为高德地图坐标。
                        </small>
                    </div>

                    <!-- 钓点描述 -->
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-pen"></i> 钓点描述
                        </label>
                        <textarea class="form-control" id="spotDesc" rows="4" placeholder="描述钓点的特点、通常能钓到的鱼种、最佳钓鱼时间等..."></textarea>
                        <small class="form-text text-muted">可选，但详细的描述能帮助你以后更好地规划钓鱼</small>
                    </div>

                    <!-- 提示信息 -->
                    <div class="alert alert-info" role="alert">
                        <i class="fas fa-lightbulb"></i>
                        <strong>提示：</strong>坐标可以通过高德地图或其他地图应用获取。如不知道精确坐标，可先填写省市，以后再修改。
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="saveSpotBtn">
                    <i class="fas fa-save"></i> 保存钓点
                </button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
const token = localStorage.getItem('token');
let currentSpotId = null;
let provinces = [];
let isSavingSpot = false;

function escapeHTML(value) {
    return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    }[char]));
}

function renderSpotsMessage(type, title, detail = '') {
    const container = document.getElementById('mySpots');
    const stateClass = type === 'error' ? 'error-state' : 'empty-state';
    const icon = type === 'error' ? 'fa-triangle-exclamation' : 'fa-inbox';
    container.innerHTML = `
        <div class="col-12">
            <div class="${stateClass}">
                <i class="fas ${icon} fa-2x mb-3"></i>
                <h5>${escapeHTML(title)}</h5>
                ${detail ? `<p class="mb-0">${escapeHTML(detail)}</p>` : ''}
            </div>
        </div>
    `;
}

// 初始化
document.addEventListener('DOMContentLoaded', async function() {
    if (!token) {
        alert('请先登录');
        window.location.href = '/login';
        return;
    }

    const spotModal = document.getElementById('spotModal');
    if (spotModal && spotModal.parentElement !== document.body) {
        document.body.appendChild(spotModal);
    }

    // 加载省份数据
    await loadProvinces();

    // 加载用户的钓点
    await loadMySpots();

    // 绑定事件
    document.getElementById('provinceSelect').addEventListener('change', updateCities);
    document.getElementById('addSpotBtn').addEventListener('click', resetForm);
    document.getElementById('saveSpotBtn').addEventListener('click', saveSpot);
    document.getElementById('useCurrentLocationBtn').addEventListener('click', fillCurrentLocation);
});

// 加载省份数据
async function loadProvinces() {
    try {
        const data = await apiFetch('/api/provinces');
        provinces = Array.isArray(data?.provinces) ? data.provinces : (Array.isArray(data) ? data : []);

        const select = document.getElementById('provinceSelect');
        select.innerHTML = '<option value="">-- 选择省份 --</option>';
        provinces.forEach(province => {
            if (!province || !province.name) return;
            const option = document.createElement('option');
            option.value = province.name;
            option.textContent = province.name;
            select.appendChild(option);
        });
    } catch (error) {
        console.error('Error loading provinces:', error);
        alert('加载省份列表失败：' + error.message);
    }
}

// 更新城市列表
function appendMissingOption(select, value) {
    if (!value || Array.from(select.options).some(option => option.value === value)) {
        return;
    }
    const option = document.createElement('option');
    option.value = value;
    option.textContent = value;
    select.appendChild(option);
}

function updateCities(selectedCity = '') {
    const provinceSelect = document.getElementById('provinceSelect');
    const citySelect = document.getElementById('citySelect');
    const selectedProvince = provinceSelect.value;

    citySelect.innerHTML = '<option value="">-- 选择城市 --</option>';

    if (!selectedProvince) {
        appendMissingOption(citySelect, selectedCity);
        citySelect.value = selectedCity;
        return;
    }

    const province = provinces.find(p => p.name === selectedProvince);
    if (province && Array.isArray(province.cities)) {
        province.cities.forEach(city => {
            const option = document.createElement('option');
            option.value = city;
            option.textContent = city;
            citySelect.appendChild(option);
        });
    }
    appendMissingOption(citySelect, selectedCity);
    citySelect.value = selectedCity;
}

// 重置表单
function resetForm() {
    currentSpotId = null;
    document.getElementById('spotForm').reset();
    document.getElementById('spotModalTitle').innerHTML = '<i class="fas fa-plus"></i> 新增钓点';
    document.getElementById('citySelect').innerHTML = '<option value="">-- 先选择省份 --</option>';
    document.getElementById('locationStatus').textContent = '将使用浏览器定位，并自动转换为高德地图坐标。';
}

async function fillCurrentLocation() {
    const status = document.getElementById('locationStatus');
    if (!navigator.geolocation) {
        status.textContent = '当前浏览器不支持定位。';
        return;
    }

    if (!AnglrMap.canPromptForLocation()) {
        status.textContent = '浏览器只会在 HTTPS 或 localhost 页面拉起定位授权。当前页面不是安全上下文，请使用 HTTPS 访问，或手动填写高德经纬度。';
        return;
    }

    const permissionState = await AnglrMap.getLocationPermissionState();
    if (permissionState === 'denied') {
        status.textContent = '当前站点定位权限已被浏览器拒绝。请点击地址栏左侧的站点设置，把“位置”改为允许后重试。';
        return;
    }

    status.textContent = '正在获取当前位置...';
    navigator.geolocation.getCurrentPosition(
        function(position) {
            const converted = AnglrMap.wgs84ToGcj02(position.coords.latitude, position.coords.longitude);
            document.getElementById('latitude').value = converted.lat.toFixed(6);
            document.getElementById('longitude').value = converted.lng.toFixed(6);
            status.textContent = `已填入当前位置，精度约 ${Math.round(position.coords.accuracy || 0)} 米；坐标已按高德地图校准。`;
        },
        function(error) {
            status.textContent = {
                1: '定位权限被拒绝。请在地址栏左侧的站点设置中允许“位置”，或手动填写高德经纬度。',
                2: '暂时无法获取当前位置，请检查网络或定位服务。',
                3: '定位超时，请移动到信号更好的位置后重试。'
            }[error.code] || '定位失败，请稍后重试。';
        },
        {
            enableHighAccuracy: true,
            timeout: 12000,
            maximumAge: 60000
        }
    );
}

// 保存钓点
async function saveSpot() {
    if (isSavingSpot) return;

    const saveBtn = document.getElementById('saveSpotBtn');
    const originalText = saveBtn.innerHTML;
    const name = document.getElementById('spotName').value.trim();
    const province = document.getElementById('provinceSelect').value.trim();
    const city = document.getElementById('citySelect').value.trim();
    const waterType = document.getElementById('waterType').value;
    const latitude = parseFloat(document.getElementById('latitude').value);
    const longitude = parseFloat(document.getElementById('longitude').value);
    const description = document.getElementById('spotDesc').value.trim();

    if (!name || !province || !city || !waterType || !Number.isFinite(latitude) || !Number.isFinite(longitude)) {
        alert('请填写所有必填项');
        return;
    }

    const spotData = {
        name,
        province,
        city,
        water_type: waterType,
        latitude,
        longitude,
        description
    };

    try {
        isSavingSpot = true;
        saveBtn.disabled = true;
        saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 保存中...';

        let url = '/api/spots';
        let method = 'POST';

        if (currentSpotId) {
            url = `/api/spots/${currentSpotId}`;
            method = 'PUT';
        }

        await apiFetch(url, {
            method,
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(spotData)
        });

        alert('保存成功！');
        bootstrap.Modal.getOrCreateInstance(document.getElementById('spotModal')).hide();
        await loadMySpots();
    } catch (error) {
        console.error('Error saving spot:', error);
        if (error.message.includes('登录状态已失效')) {
            redirectToLogin(error.message);
            return;
        }
        alert('保存失败：' + error.message);
    } finally {
        isSavingSpot = false;
        saveBtn.disabled = false;
        saveBtn.innerHTML = originalText;
    }
}

// 加载用户的钓点
async function loadMySpots() {
    try {
        const spots = await apiFetch('/api/spots/mine');
        const container = document.getElementById('mySpots');

        if (spots.length === 0) {
            container.innerHTML = `
                <div class="col-12">
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>还没有添加钓点，<a href="#" onclick="document.getElementById('addSpotBtn').click()">立即新增</a></p>
                    </div>
                </div>
            `;
            return;
        }

        container.innerHTML = spots.map(spot => `
            <div class="col-md-6 col-lg-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-location-dot"></i> ${escapeHTML(spot.name)}
                        </h5>
                    </div>
                    <div class="card-body">
                        <p class="mb-2">
                            <strong><i class="fas fa-map"></i> 位置：</strong>
                            ${escapeHTML(spot.province || '未知')} ${escapeHTML(spot.city || '')}
                        </p>
                        <p class="mb-2">
                            <strong><i class="fas fa-water"></i> 水体：</strong>
                            ${getWaterTypeLabel(spot.water_type)}
                        </p>
                        ${spot.user_nickname ? `
                            <p class="mb-2">
                                <strong><i class="fas fa-user"></i> 创建者：</strong>
                                ${escapeHTML(spot.user_nickname)}
                            </p>
                        ` : ''}
                        <p class="mb-2">
                            <strong><i class="fas fa-globe"></i> 坐标：</strong>
                            ${spot.latitude}, ${spot.longitude}
                        </p>
                        ${spot.description ? `
                            <p class="mb-2">
                                <strong><i class="fas fa-pen"></i> 描述：</strong><br>
                                <small>${escapeHTML(spot.description)}</small>
                            </p>
                        ` : ''}
                        <small class="text-muted">
                            <i class="fas fa-clock"></i> ${new Date(spot.created_at).toLocaleDateString('zh-CN')}
                        </small>
                    </div>
                    <div class="card-footer bg-light">
                        <button class="btn btn-sm btn-primary" onclick="editSpot(${spot.id})">
                            <i class="fas fa-edit"></i> 编辑
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteSpot(${spot.id})">
                            <i class="fas fa-trash"></i> 删除
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    } catch (error) {
        console.error('Error loading spots:', error);
        if (error.message.includes('登录状态已失效')) {
            redirectToLogin(error.message);
            return;
        }
        renderSpotsMessage('error', '加载钓点失败', error.message);
    }
}

// 水体类型标签
function getWaterTypeLabel(type) {
    const labels = {
        'river': '河流 <i class="fas fa-water"></i>',
        'lake': '湖泊 <i class="fas fa-water"></i>',
        'reservoir': '水库 <i class="fas fa-water"></i>',
        'sea': '海水 <i class="fas fa-water"></i>',
        'pond': '池塘 <i class="fas fa-water"></i>',
        'other': '其他'
    };
    return labels[type] || type;
}

// 编辑钓点
async function editSpot(spotId) {
    try {
        const spot = await apiFetch(`/api/spots/${spotId}`);

        currentSpotId = spotId;
        appendMissingOption(document.getElementById('provinceSelect'), spot.province);
        document.getElementById('spotName').value = spot.name || '';
        document.getElementById('provinceSelect').value = spot.province || '';
        updateCities(spot.city || '');
        document.getElementById('waterType').value = spot.water_type || '';
        document.getElementById('latitude').value = spot.latitude ?? '';
        document.getElementById('longitude').value = spot.longitude ?? '';
        document.getElementById('spotDesc').value = spot.description || '';

        document.getElementById('spotModalTitle').innerHTML = '<i class="fas fa-edit"></i> 编辑钓点';
        bootstrap.Modal.getOrCreateInstance(document.getElementById('spotModal')).show();
    } catch (error) {
        console.error('Error loading spot:', error);
        if (error.message.includes('登录状态已失效')) {
            redirectToLogin(error.message);
            return;
        }
        alert('加载钓点信息失败：' + error.message);
    }
}

// 删除钓点
async function deleteSpot(spotId) {
    if (!confirm('确定要删除这个钓点吗？')) return;

    try {
        await apiFetch(`/api/spots/${spotId}`, {
            method: 'DELETE'
        });

        alert('删除成功！');
        await loadMySpots();
    } catch (error) {
        console.error('Error deleting spot:', error);
        if (error.message.includes('登录状态已失效')) {
            redirectToLogin(error.message);
            return;
        }
        alert('删除失败：' + error.message);
    }
}
</script>
{% endblock %}
