{% extends "base.html" %}

{% block title %}我的记录 - 渔迹录{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-8">
        <h1 class="page-title mb-0"><i class="fas fa-list"></i> 我的出钓记录</h1>
    </div>
    <div class="col-md-4 text-end">
        <a href="/logs/create" class="btn btn-success">
            <i class="fas fa-plus"></i> 新建记录
        </a>
    </div>
</div>

<div id="logsList">
    <div class="text-center">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">加载中...</span>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const token = localStorage.getItem('token');
        if (!token) {
            alert('请先登录');
            window.location.href = '/login';
            return;
        }

        loadLogs();
    });

    function escapeHTML(value) {
        return String(value ?? '').replace(/[&<>"']/g, char => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[char]));
    }

    async function loadLogs() {
        try {
            const logs = await apiFetch('/api/logs');
            const logsList = document.getElementById('logsList');

            if (logs.length === 0) {
                logsList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-info-circle"></i> 您还没有任何记录，<a href="/logs/create">创建第一条记录</a>
                    </div>
                `;
                return;
            }

            logsList.innerHTML = logs.map(log => `
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-8">
                                <h5 class="card-title mb-2">
                                    <i class="fas fa-fish"></i>
                                    ${escapeHTML(log.species || '未知鱼种')}
                                    <span class="badge bg-secondary">${log.quantity || 0}条</span>
                                </h5>
                                <p class="card-text text-muted mb-2">
                                    <small>
                                        <i class="fas fa-calendar"></i>
                                        ${new Date(log.fishing_at).toLocaleString('zh-CN')}
                                        ${log.user_nickname ? ` <span class="ms-3"><i class="fas fa-user"></i> ${escapeHTML(log.user_nickname)}</span>` : ''}
                                    </small>
                                </p>
                                <p class="card-text">
                                    <small>
                                        <i class="fas fa-hourglass-end"></i> 作钓时长: ${log.duration}分钟
                                        ${log.bait ? `| <i class="fas fa-worm"></i> 饵料: ${escapeHTML(log.bait)}` : ''}
                                    </small>
                                </p>
                                ${log.note ? `<p class="card-text"><small>${escapeHTML(log.note)}</small></p>` : ''}
                                <div class="weather-info mt-2">
                                    <small class="text-muted">
                                        <i class="fas fa-cloud"></i> ${log.temperature || '?'}°C |
                                        <i class="fas fa-wind"></i> ${log.wind_speed || '?'} m/s |
                                        <i class="fas fa-gauge"></i> ${log.pressure || '?'} hPa
                                    </small>
                                </div>
                            </div>
                            <div class="col-md-4 text-end">
                                <button class="btn btn-sm btn-primary" onclick="editLog(${log.id})">
                                    <i class="fas fa-edit"></i> 编辑
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="deleteLog(${log.id})">
                                    <i class="fas fa-trash"></i> 删除
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            console.error('Error:', error);
            if (error.message.includes('登录状态已失效')) {
                redirectToLogin(error.message);
                return;
            }
            document.getElementById('logsList').innerHTML = `<div class="error-state">加载失败：${escapeHTML(error.message)}</div>`;
        }
    }

    async function deleteLog(logId) {
        if (!confirm('确认删除此记录？')) {
            return;
        }

        try {
            await apiFetch(`/api/logs/${logId}`, {
                method: 'DELETE'
            });

            alert('记录已删除');
            loadLogs();
        } catch (error) {
            console.error('Error:', error);
            if (error.message.includes('登录状态已失效')) {
                redirectToLogin(error.message);
                return;
            }
            alert('删除失败：' + error.message);
        }
    }

    function editLog(logId) {
        window.location.href = `/logs/${logId}/edit`;
    }
</script>
{% endblock %}
