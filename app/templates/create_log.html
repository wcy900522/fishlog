{% extends "base.html" %}

{% block title %}新建记录 - AnglrLog{% endblock %}

{% block extra_css %}
<style>
    .log-photo-preview {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
        gap: 10px;
        margin-top: 12px;
    }

    .log-photo-preview__item {
        aspect-ratio: 4 / 3;
        border-radius: var(--radius);
        overflow: hidden;
        border: 1px solid var(--border-soft);
        background: var(--surface-muted);
    }

    .log-photo-preview__item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    .log-card-header {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
    }

    .log-form-tip {
        max-width: 320px;
        padding: 8px 10px;
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.16);
        border: 1px solid rgba(255, 255, 255, 0.28);
        color: rgba(255, 255, 255, 0.92);
        font-size: 0.86rem;
        font-weight: 700;
        line-height: 1.45;
    }

    .log-form-tip a {
        color: #fff;
        text-decoration: underline;
        text-underline-offset: 3px;
    }

    .species-picker {
        display: grid;
        gap: 10px;
        margin-top: 10px;
    }

    .species-picker__group {
        display: grid;
        gap: 8px;
    }

    .species-picker__label {
        color: var(--text-muted);
        font-size: 0.84rem;
        font-weight: 800;
    }

    .species-chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }

    /* 与 spots.html 目标鱼芯片统一，复用全局 token */
    .species-chip {
        border: 1px solid rgba(var(--brand-teal-rgb), 0.24);
        border-radius: var(--radius-pill);
        background: #fff;
        color: var(--brand-deep);
        padding: 6px 11px;
        font-size: 0.88rem;
        font-weight: 800;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .species-chip:focus-visible {
        outline: none;
        box-shadow: var(--focus-ring);
    }

    .species-chip.active {
        color: #062b35;
        background: linear-gradient(135deg, #84ddf2, #8de3ca);
        border-color: rgba(var(--brand-teal-rgb), 0.34);
        box-shadow: 0 8px 18px rgba(var(--brand-teal-rgb), 0.14);
    }

    @media (max-width: 767.98px) {
        .log-card-header {
            align-items: flex-start;
            flex-direction: column;
        }

        .log-form-tip {
            max-width: none;
            width: 100%;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header log-card-header">
                <h4 class="mb-0"><i class="fas fa-pen"></i> 记录一次出钓</h4>
                <div class="log-form-tip">
                    <i class="fas fa-circle-info"></i> 如未有钓点信息，请先<a href="/spots">新增钓点</a>后填写。
                </div>
            </div>
            <div class="card-body">
                <form id="logForm">
                    <div class="mb-3">
                        <label for="spot" class="form-label">钓点 <span class="text-danger">*</span></label>
                        <select class="form-select" id="spot" name="spot_id" required>
                            <option value="">请选择钓点</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="fishing_at" class="form-label">出钓时间 <span class="text-danger">*</span></label>
                                <input type="datetime-local" class="form-control" id="fishing_at" name="fishing_at" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="duration" class="form-label">作钓时长(小时) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="duration" name="duration" min="0.1" max="24" step="0.1" placeholder="如：3.5" required>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="species" class="form-label">鱼种</label>
                                <input type="text" class="form-control" id="species" name="species" placeholder="如：鲤鱼、草鱼">
                                <div class="species-picker" id="speciesPicker">
                                    <div class="species-picker__group">
                                        <span class="species-picker__label">常见台钓鱼种</span>
                                        <div class="species-chip-row" id="floatSpeciesChips"></div>
                                    </div>
                                    <div class="species-picker__group">
                                        <span class="species-picker__label">常见路亚鱼种</span>
                                        <div class="species-chip-row" id="lureSpeciesChips"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="bait" class="form-label">饵料</label>
                                <input type="text" class="form-control" id="bait" name="bait" placeholder="如：玉米、蚯蚓">
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="quantity" class="form-label">渔获数量</label>
                        <input type="number" class="form-control" id="quantity" name="quantity" min="0" placeholder="条数">
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="weight" class="form-label">总重量(kg)</label>
                                <input type="number" class="form-control" id="weight" name="weight" min="0" step="0.01" placeholder="如：3.5">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="tide" class="form-label">潮汐/水情</label>
                                <input type="text" class="form-control" id="tide" name="tide" placeholder="如：涨潮、退潮、轻微走水">
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="rod" class="form-label">鱼竿</label>
                                <input type="text" class="form-control" id="rod" name="rod" placeholder="如：ML 直柄">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="line_group" class="form-label">线组</label>
                                <input type="text" class="form-control" id="line_group" name="line_group" placeholder="如：PE 0.8 + 碳线 2.0">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="equipment" class="form-label">装备组合</label>
                                <input type="text" class="form-control" id="equipment" name="equipment" placeholder="如：水滴轮 + 亮片">
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="logImages" class="form-label">出钓照片</label>
                        <input type="file" class="form-control" id="logImages" accept="image/*" capture="environment" multiple>
                        <small class="form-text text-muted">可拍照或从手机相册选择，最多上传 3 张。</small>
                        <div class="log-photo-preview" id="logPhotoPreview"></div>
                    </div>

                    <div class="mb-3">
                        <label for="note" class="form-label">备注</label>
                        <textarea class="form-control" id="note" name="note" rows="3" placeholder="记录更多细节..."></textarea>
                    </div>

                    <div class="alert alert-info">
                        <i class="fas fa-info-circle"></i> 提交后，系统将自动记录天气数据（温度、气压、风速）
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> 保存记录
                        </button>
                        <a href="/" class="btn btn-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const MAX_LOG_PHOTOS = 3;
    const COMMON_FLOAT_SPECIES = ['鲫鱼', '鲤鱼', '草鱼', '青鱼', '鳊鱼', '鲢鳙', '翘嘴', '罗非'];
    const COMMON_LURE_SPECIES = ['鲈鱼', '黑鱼', '鳜鱼', '翘嘴', '马口', '军鱼', '鲶鱼', '海鲈'];
    let selectedSpecies = new Set();

    document.addEventListener('DOMContentLoaded', function() {
        const token = localStorage.getItem('token');
        if (!token) {
            alert('请先登录');
            window.location.href = '/login';
            return;
        }

        loadSpots();
        renderSpeciesChips();
        document.getElementById('logImages').addEventListener('change', previewLogImages);
        document.getElementById('species').addEventListener('input', syncSpeciesFromInput);

        // Set default datetime to now
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const date = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('fishing_at').value = `${year}-${month}-${date}T${hours}:${minutes}`;

        // Form submission
        document.getElementById('logForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const spotId = parseInt(document.getElementById('spot').value);
            const fishingAt = document.getElementById('fishing_at').value;
            const species = document.getElementById('species').value;
            const bait = document.getElementById('bait').value;
            const quantity = document.getElementById('quantity').value ? parseInt(document.getElementById('quantity').value) : null;
            const weight = document.getElementById('weight').value ? parseFloat(document.getElementById('weight').value) : null;
            const tide = document.getElementById('tide').value;
            const equipment = document.getElementById('equipment').value;
            const rod = document.getElementById('rod').value;
            const lineGroup = document.getElementById('line_group').value;
            const note = document.getElementById('note').value;

            try {
                const duration = hoursToMinutes(document.getElementById('duration').value);
                const photoUrls = await uploadLogImages();
                const payload = {
                    spot_id: spotId,
                    fishing_at: new Date(fishingAt).toISOString(),
                    duration,
                    species: species || null,
                    bait: bait || null,
                    quantity: quantity,
                    weight: weight,
                    tide: tide || null,
                    equipment: equipment || null,
                    rod: rod || null,
                    line_group: lineGroup || null,
                    photo_urls: photoUrls.length ? photoUrls : null,
                    note: note || null
                };

                await apiFetch('/api/logs', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                alert('记录保存成功！');
                window.location.href = '/logs';
            } catch (error) {
                console.error('Error:', error);
                if (error.message.includes('登录状态已失效')) {
                    redirectToLogin(error.message);
                    return;
                }
                alert('保存失败：' + error.message);
            }
        });
    });

    function renderSpeciesChips() {
        renderSpeciesChipGroup('floatSpeciesChips', COMMON_FLOAT_SPECIES);
        renderSpeciesChipGroup('lureSpeciesChips', COMMON_LURE_SPECIES);
    }

    function renderSpeciesChipGroup(containerId, speciesList) {
        const container = document.getElementById(containerId);
        container.innerHTML = speciesList.map(species => `
            <button type="button" class="species-chip" data-species="${escapeHTML(species)}">${escapeHTML(species)}</button>
        `).join('');
        container.querySelectorAll('.species-chip').forEach(button => {
            button.addEventListener('click', () => toggleSpecies(button.dataset.species));
        });
    }

    function toggleSpecies(species) {
        if (selectedSpecies.has(species)) {
            selectedSpecies.delete(species);
        } else {
            selectedSpecies.add(species);
        }
        updateSpeciesInput();
        updateSpeciesChipState();
    }

    function updateSpeciesInput() {
        document.getElementById('species').value = Array.from(selectedSpecies).join('、');
    }

    function syncSpeciesFromInput() {
        const values = document.getElementById('species').value
            .split(/[、,，\s]+/)
            .map(value => value.trim())
            .filter(Boolean);
        selectedSpecies = new Set(values);
        updateSpeciesChipState();
    }

    function updateSpeciesChipState() {
        document.querySelectorAll('.species-chip').forEach(button => {
            button.classList.toggle('active', selectedSpecies.has(button.dataset.species));
        });
    }

    function renderLogPhotoPreview(urls) {
        const preview = document.getElementById('logPhotoPreview');
        preview.innerHTML = urls.map(url => `
            <div class="log-photo-preview__item">
                <img src="${escapeHTML(url)}" alt="出钓照片">
            </div>
        `).join('');
    }

    function hoursToMinutes(value) {
        const hours = parseFloat(value);
        if (!Number.isFinite(hours) || hours <= 0) {
            throw new Error('请填写有效的作钓时长');
        }
        return Math.round(hours * 60);
    }

    function previewLogImages() {
        const input = document.getElementById('logImages');
        const files = Array.from(input.files || []);
        if (files.length > MAX_LOG_PHOTOS) {
            alert(`最多上传 ${MAX_LOG_PHOTOS} 张出钓照片`);
            input.value = '';
            renderLogPhotoPreview([]);
            return;
        }
        renderLogPhotoPreview(files.map(file => URL.createObjectURL(file)));
    }

    async function uploadLogImages() {
        const input = document.getElementById('logImages');
        const files = Array.from(input.files || []);
        if (files.length > MAX_LOG_PHOTOS) {
            throw new Error(`最多上传 ${MAX_LOG_PHOTOS} 张出钓照片`);
        }

        const urls = [];
        for (const file of files) {
            const formData = new FormData();
            formData.append('image', file);
            const result = await apiFetch('/api/logs/images', {
                method: 'POST',
                body: formData
            });
            urls.push(result.url);
        }
        return urls;
    }

    function escapeHTML(value) {
        return String(value ?? '').replace(/[&<>"']/g, char => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[char]));
    }

    async function loadSpots() {
        try {
            const spots = await apiFetch('/api/spots');
            const spotSelect = document.getElementById('spot');
            spots.forEach(spot => {
                const option = document.createElement('option');
                option.value = spot.id;
                option.textContent = `${spot.name} (${spot.city || '未知'})`;
                spotSelect.appendChild(option);
            });

            const params = new URLSearchParams(window.location.search);
            const spotId = params.get('spot_id');
            if (spotId) {
                spotSelect.value = spotId;
            }
        } catch (error) {
            console.error('Error:', error);
            if (error.message.includes('登录状态已失效')) {
                redirectToLogin(error.message);
                return;
            }
            alert('加载钓点失败：' + error.message);
        }
    }
</script>
{% endblock %}
